name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_ROOT: ${{ github.workspace }}/.cache/vcpkg
  VCPKG_DEFAULT_TRIPLET: x64-linux
  VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.cache/vcpkg-binary,readwrite
  CMAKE_BUILD_PARALLEL_LEVEL: 2
  VCPKG_MAX_CONCURRENCY: 2

permissions:
  contents: read

# CI coverage split:
# - shader-assets compiles the shared glsl-120, essl-100, and essl-300 shader tree.
# - Platform jobs consume the artifact with local shader compilation disabled.

jobs:
  shader-assets:
    name: Shader assets
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            cmake \
            curl \
            zip \
            unzip \
            tar \
            git \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            autoconf \
            autoconf-archive \
            automake \
            libtool \
            libltdl-dev \
            libxtst-dev \
            pkg-config \
            bison \
            flex

      - name: Cache vcpkg
        uses: actions/cache@v5
        with:
          path: |
            .cache/vcpkg
            .cache/vcpkg-binary
            vcpkg_installed
          key: ${{ runner.os }}-vcpkg-shader-assets-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'cmake/NovelTeaLua.cmake') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-shader-assets-

      - name: Bootstrap vcpkg
        run: |
          if [ ! -d "$VCPKG_ROOT/.git" ]; then
            git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
          fi
          "$VCPKG_ROOT/bootstrap-vcpkg.sh"

      - name: Install bgfx shader tools
        run: |
          "$VCPKG_ROOT/vcpkg" install \
            --x-feature=shader-tools \
            --triplet="$VCPKG_DEFAULT_TRIPLET" \
            --host-triplet=x64-linux \
            --x-install-root="${{ github.workspace }}/vcpkg_installed"

          SHADERC="${{ github.workspace }}/vcpkg_installed/x64-linux/tools/bgfx/shaderc"
          test -x "$SHADERC"

      - name: Compile and verify shader assets
        run: |
          SHADERC="${{ github.workspace }}/vcpkg_installed/x64-linux/tools/bgfx/shaderc"
          BGFX_SHADER_INCLUDE="${{ github.workspace }}/vcpkg_installed/x64-linux/include/bgfx"
          cmake \
            -DNOVELTEA_SHADERC_EXECUTABLE="$SHADERC" \
            -DNOVELTEA_SHADER_SOURCE_DIR="${{ github.workspace }}/engine/shaders/bgfx" \
            -DNOVELTEA_SHADER_OUTPUT_ROOT="${{ github.workspace }}/build/generated-assets/shaders" \
            '-DNOVELTEA_SHADER_VARIANTS=glsl-120;essl-100;essl-300' \
            -DNOVELTEA_BGFX_SHADER_INCLUDE_DIR="$BGFX_SHADER_INCLUDE" \
            -P "${{ github.workspace }}/cmake/CompileNovelTeaShaders.cmake"
          cmake \
            -DNOVELTEA_VERIFY_ONLY=ON \
            -DNOVELTEA_SHADER_OUTPUT_ROOT="${{ github.workspace }}/build/generated-assets/shaders" \
            '-DNOVELTEA_SHADER_VARIANTS=glsl-120;essl-100;essl-300' \
            -P "${{ github.workspace }}/cmake/CompileNovelTeaShaders.cmake"

      - name: Upload shader assets
        uses: actions/upload-artifact@v7
        with:
          name: noveltea-shader-assets
          path: build/generated-assets/shaders
          if-no-files-found: error

  linux:
    name: Linux desktop
    runs-on: ubuntu-24.04
    needs: shader-assets
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            cmake \
            pkg-config \
            curl \
            zip \
            unzip \
            tar \
            git \
            xvfb \
            libgl1-mesa-dev \
            libgl1-mesa-dri \
            libegl1-mesa-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            libwayland-dev \
            wayland-protocols \
            libltdl-dev \
            libxtst-dev \
            autoconf \
            automake \
            autoconf-archive \
            libtool \
            bison \
            flex

      - name: Cache vcpkg
        uses: actions/cache@v5
        with:
          path: |
            .cache/vcpkg
            .cache/vcpkg-binary
            build/linux-debug/vcpkg_installed
          key: ${{ runner.os }}-vcpkg-linux-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'CMakePresets.json', 'cmake/NovelTeaLua.cmake') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-linux-

      - name: Bootstrap vcpkg
        run: |
          if [ ! -d "$VCPKG_ROOT/.git" ]; then
            git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
          fi
          "$VCPKG_ROOT/bootstrap-vcpkg.sh"

      - name: Download shader assets
        uses: actions/download-artifact@v7
        with:
          name: noveltea-shader-assets
          path: build/prebuilt-shader-assets

      - name: Configure
        run: cmake --preset linux-debug -G Ninja -DVCPKG_MANIFEST_FEATURES=tests -DNOVELTEA_COMPILE_SHADERS=OFF -DNOVELTEA_PREBUILT_SHADER_ASSET_ROOT="${{ github.workspace }}/build/prebuilt-shader-assets" -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build --preset linux-debug

      - name: Unit tests
        run: xvfb-run -a ctest --test-dir build/linux-debug --output-on-failure

      - name: Headless sandbox smoke
        run: |
          xvfb-run -a ./build/linux-debug/apps/sandbox/noveltea-sandbox --demo all --frames 180
          xvfb-run -a ./build/linux-debug/apps/sandbox/noveltea-sandbox --demo none --rmlui-document project:/rmlui/lua_demo.rml --frames 3 2>&1 | tee /tmp/noveltea-rmlui-lua.log
          grep -q RMLUI_LUA_TEST_OK /tmp/noveltea-rmlui-lua.log
          mkdir -p /tmp/noveltea-package
          cp ./build/linux-debug/apps/sandbox/noveltea-sandbox /tmp/noveltea-package/
          cp -R ./build/linux-debug/runtime-assets /tmp/noveltea-package/assets
          cd /tmp
          xvfb-run -a /tmp/noveltea-package/noveltea-sandbox --demo all --frames 180

  web:
    name: Web / Emscripten
    runs-on: ubuntu-24.04
    needs: shader-assets
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            cmake \
            curl \
            zip \
            unzip \
            tar \
            git \
            autoconf \
            automake \
            autoconf-archive \
            libtool \
            bison \
            flex

      - name: Cache Emscripten SDK
        uses: actions/cache@v5
        with:
          path: .cache/emsdk
          key: ${{ runner.os }}-emsdk-latest
          restore-keys: |
            ${{ runner.os }}-emsdk-

      - name: Install Emscripten
        run: |
          if [ ! -d "${{ github.workspace }}/.cache/emsdk/.git" ]; then
            git clone https://github.com/emscripten-core/emsdk.git "${{ github.workspace }}/.cache/emsdk"
          fi
          cd "${{ github.workspace }}/.cache/emsdk"
          ./emsdk install latest
          ./emsdk activate latest

      - name: Download shader assets
        uses: actions/download-artifact@v7
        with:
          name: noveltea-shader-assets
          path: build/prebuilt-shader-assets

      - name: Configure and build web release preview
        env:
          EMSDK: ${{ github.workspace }}/.cache/emsdk
        run: |
          source "$EMSDK/emsdk_env.sh"
          emcmake cmake --preset web-release -G Ninja -DNOVELTEA_COMPILE_SHADERS=OFF -DNOVELTEA_PREBUILT_SHADER_ASSET_ROOT="${{ github.workspace }}/build/prebuilt-shader-assets" -DBUILD_TESTING=OFF
          cmake --build --preset web-release --target noveltea-sandbox
          test -f build/web-release/apps/sandbox/index.data
          test -f build/web-release/apps/sandbox/index.html
          test -f build/web-release/apps/sandbox/index.js
          test -f build/web-release/apps/sandbox/index.wasm
          grep -q '/assets/rmlui/lua_demo.rml' build/web-release/apps/sandbox/index.js
          grep -q '/assets/rmlui/lua_demo.lua' build/web-release/apps/sandbox/index.js

      - name: Upload web release preview
        uses: actions/upload-artifact@v7
        with:
          name: noveltea-web-release-preview
          path: build/web-release/apps/sandbox
          if-no-files-found: error

  android:
    name: Android
    runs-on: ubuntu-24.04
    needs: shader-assets
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            cmake \
            curl \
            zip \
            unzip \
            tar \
            git \
            autoconf \
            automake \
            autoconf-archive \
            libtool \
            bison \
            flex

      - name: Install Android SDK packages
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;26.3.11579264" \
            "cmake;3.31.6"

      - name: Download SDL3 Android AAR
        run: |
          mkdir -p android/app/libs .cache/sdl3-android
          curl -L \
            -o .cache/sdl3-android/SDL3-devel-3.4.10-android.zip \
            https://github.com/libsdl-org/SDL/releases/download/release-3.4.10/SDL3-devel-3.4.10-android.zip
          unzip -p \
            .cache/sdl3-android/SDL3-devel-3.4.10-android.zip \
            SDL3-3.4.10.aar \
            > android/app/libs/SDL3-3.4.10.aar

      - name: Download shader assets
        uses: actions/download-artifact@v7
        with:
          name: noveltea-shader-assets
          path: build/prebuilt-shader-assets

      - name: Build Android debug APK
        working-directory: android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.3.11579264
        run: ./gradlew --no-daemon :app:assembleDebug -PnovelteaCompileShaders=OFF -PnovelteaPrebuiltShaderAssetRoot="${{ github.workspace }}/build/prebuilt-shader-assets"

      - name: Verify Android packaged assets
        working-directory: android
        run: |
          unzip -l app/build/outputs/apk/debug/app-debug.apk | grep -E 'assets/shaders/bgfx/essl-300/triangle.vs.bin'
          for shader in triangle quad text imgui rmlui; do
            unzip -l app/build/outputs/apk/debug/app-debug.apk | grep -E "assets/shaders/bgfx/essl-300/${shader}\.vs\.bin"
            unzip -l app/build/outputs/apk/debug/app-debug.apk | grep -E "assets/shaders/bgfx/essl-300/${shader}\.fs\.bin"
          done
          unzip -l app/build/outputs/apk/debug/app-debug.apk | grep -E 'assets/rmlui/LiberationSans.ttf'
          unzip -l app/build/outputs/apk/debug/app-debug.apk | grep -E 'assets/rmlui/demo.rml'
          unzip -l app/build/outputs/apk/debug/app-debug.apk | grep -E 'assets/rmlui/lua_demo.rml'
          unzip -l app/build/outputs/apk/debug/app-debug.apk | grep -E 'assets/rmlui/lua_demo.lua'

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: noveltea-android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  editor:
    name: Editor / Electron
    runs-on: ubuntu-24.04
    needs: web
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            cmake \
            pkg-config \
            curl \
            zip \
            unzip \
            tar \
            git \
            rpm \
            fakeroot \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxdamage-dev \
            libxfixes-dev \
            libcups2-dev \
            libnss3-dev \
            libnspr4-dev \
            libatk1.0-dev \
            libatk-bridge2.0-dev \
            libgtk-3-dev \
            libdrm-dev \
            libasound2-dev \
            libgbm-dev \
            libpango1.0-dev \
            libcairo2-dev

      - name: Download web release preview
        uses: actions/download-artifact@v7
        with:
          name: noveltea-web-release-preview
          path: build/web-release/apps/sandbox

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: editor/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: editor
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: editor
        run: pnpm lint

      - name: Typecheck
        working-directory: editor
        run: pnpm typecheck

      - name: Test
        working-directory: editor
        run: pnpm test

      - name: Verify packaged engine preview
        run: |
          test -f build/web-release/apps/sandbox/index.html
          test -f build/web-release/apps/sandbox/index.js
          test -f build/web-release/apps/sandbox/index.wasm
          test -f build/web-release/apps/sandbox/index.data

      - name: Package distributables (smoke)
        working-directory: editor
        run: pnpm package
