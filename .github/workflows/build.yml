name: Build

on:
  push:
    branches: [master, main, fix-ci]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_ROOT: ${{ github.workspace }}/.cache/vcpkg
  VCPKG_DEFAULT_TRIPLET: x64-linux
  VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.cache/vcpkg-binary,readwrite
  CMAKE_BUILD_PARALLEL_LEVEL: 2
  VCPKG_MAX_CONCURRENCY: 2
  EMSDK_VERSION: 6.0.0
  CCACHE_DIR: ${{ github.workspace }}/.cache/ccache
  CCACHE_MAXSIZE: 500M
  CCACHE_BASEDIR: ${{ github.workspace }}
  ANDROID_API_LEVEL: "35"
  ANDROID_BUILD_TOOLS_VERSION: "35.0.0"
  ANDROID_CMAKE_VERSION: "3.31.6"
  ANDROID_NDK_VERSION: "28.2.13676358"

permissions:
  contents: read

# CI coverage split:
# - shader-assets compiles the shared glsl-120, essl-100, and essl-300 shader tree.
# - Platform jobs consume the artifact with local shader compilation disabled.

jobs:
  cxx-runtime-policy:
    name: C++ runtime policy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Audit prohibited runtime C++ constructs
        run: |
          cmake -DSOURCE_ROOT="$GITHUB_WORKSPACE" -DALLOWLIST="$GITHUB_WORKSPACE/cmake/cxx-policy-allowlist.txt" -P "$GITHUB_WORKSPACE/cmake/CheckCxxRuntimePolicy.cmake"
          cmake -DSOURCE_ROOT="$GITHUB_WORKSPACE" -P "$GITHUB_WORKSPACE/cmake/VerifyCxxRuntimePolicyChecker.cmake"
          cmake -DSOURCE_ROOT="$GITHUB_WORKSPACE" -DALLOWLIST="$GITHUB_WORKSPACE/cmake/json-boundary-allowlist.txt" -P "$GITHUB_WORKSPACE/cmake/CheckJsonBoundaryPolicy.cmake"
          cmake -DSOURCE_ROOT="$GITHUB_WORKSPACE" -P "$GITHUB_WORKSPACE/cmake/VerifyJsonBoundaryPolicyChecker.cmake"
          cmake -DSOURCE_ROOT="$GITHUB_WORKSPACE" -DCLASSIFICATION="$GITHUB_WORKSPACE/cmake/NovelTeaModuleFileClassification.cmake" -DALLOWLIST="$GITHUB_WORKSPACE/cmake/module-boundary-allowlist.txt" -P "$GITHUB_WORKSPACE/cmake/CheckModuleBoundaryPolicy.cmake"
          cmake -DSOURCE_ROOT="$GITHUB_WORKSPACE" -P "$GITHUB_WORKSPACE/cmake/VerifyModuleBoundaryPolicyChecker.cmake"
      - name: Verify compiler feature policy header
        run: |
          if c++ -std=c++20 -Iengine/include -x c++ -c engine/include/noveltea/core/compiler_policy.hpp -o /tmp/policy.o; then
            echo "policy header accepted an exception/RTTI-enabled compiler" >&2
            exit 1
          fi
          c++ -std=c++20 -fno-exceptions -fno-rtti -Iengine/include -x c++ -c engine/include/noveltea/core/compiler_policy.hpp -o /tmp/policy.o

  shader-assets:
    name: Shader assets
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            cmake \
            curl \
            zip \
            unzip \
            tar \
            git

      - name: Download shaderc
        run: |
          SHADERC_DIR="${{ github.workspace }}/.cache/shaderc"
          mkdir -p "$SHADERC_DIR"
          curl -L \
            -o "$SHADERC_DIR/bgfx-shaderc-linux-x64.tar.gz" \
            https://github.com/Cruel/nt-tools/releases/download/r1/bgfx-shaderc-linux-x64.tar.gz
          tar -xzf "$SHADERC_DIR/bgfx-shaderc-linux-x64.tar.gz" \
            -C "$SHADERC_DIR"
          SHADERC="$SHADERC_DIR/bin/shaderc"
          test -x "$SHADERC"
          echo "SHADERC=$SHADERC" >> "$GITHUB_ENV"
          echo "BGFX_SHADER_INCLUDE=$SHADERC_DIR/include/bgfx" >> "$GITHUB_ENV"

      - name: Compile and verify shader assets
        run: |
          SHADERC="${{ env.SHADERC }}"
          BGFX_SHADER_INCLUDE="${{ env.BGFX_SHADER_INCLUDE }}"
          cmake \
            -DNOVELTEA_SHADERC_EXECUTABLE="$SHADERC" \
            -DNOVELTEA_SHADER_SOURCE_DIR="${{ github.workspace }}/engine/shaders/bgfx" \
            -DNOVELTEA_SHADER_OUTPUT_ROOT="${{ github.workspace }}/build/generated-assets/shaders" \
            '-DNOVELTEA_SHADER_VARIANTS=glsl-120;essl-100;essl-300' \
            -DNOVELTEA_BGFX_SHADER_INCLUDE_DIR="$BGFX_SHADER_INCLUDE" \
            -P "${{ github.workspace }}/cmake/CompileNovelTeaShaders.cmake"
          cmake \
            -DNOVELTEA_VERIFY_ONLY=ON \
            -DNOVELTEA_SHADER_OUTPUT_ROOT="${{ github.workspace }}/build/generated-assets/shaders" \
            '-DNOVELTEA_SHADER_VARIANTS=glsl-120;essl-100;essl-300' \
            -P "${{ github.workspace }}/cmake/CompileNovelTeaShaders.cmake"

      - name: Upload shader assets
        uses: actions/upload-artifact@v7
        with:
          name: noveltea-shader-assets
          path: build/generated-assets/shaders
          if-no-files-found: error

  linux:
    name: Linux desktop
    runs-on: ubuntu-24.04
    needs: shader-assets
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            ccache \
            cmake \
            pkg-config \
            curl \
            zip \
            unzip \
            tar \
            git \
            xvfb \
            libgl1-mesa-dev \
            libgl1-mesa-dri \
            libegl1-mesa-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            libwayland-dev \
            wayland-protocols \
            libltdl-dev \
            libxtst-dev \
            autoconf \
            automake \
            autoconf-archive \
            libtool \
            bison \
            flex

      - name: Cache vcpkg SDK
        uses: actions/cache@v5
        with:
          path: |
            .cache/vcpkg
            .cache/vcpkg-binary
          key: ${{ runner.os }}-x64-vcpkg-sdk-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            ${{ runner.os }}-x64-vcpkg-sdk-

      - name: Cache vcpkg installed
        uses: actions/cache@v5
        with:
          path: build/linux-debug/vcpkg_installed
          key: ${{ runner.os }}-x64-vcpkg-installed-linux-debug-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'CMakePresets.json', 'cmake/NovelTeaLua.cmake') }}
          restore-keys: |
            ${{ runner.os }}-x64-vcpkg-installed-linux-debug-

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-linux-debug-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-linux-debug-

      - name: Bootstrap vcpkg
        run: |
          if [ ! -d "$VCPKG_ROOT/.git" ]; then
            git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
          fi
          "$VCPKG_ROOT/bootstrap-vcpkg.sh"

      - name: Download shader assets
        uses: actions/download-artifact@v7
        with:
          name: noveltea-shader-assets
          path: build/prebuilt-shader-assets

      - name: Configure
        run: cmake --preset linux-debug -G Ninja -DVCPKG_MANIFEST_FEATURES=tests -DNOVELTEA_COMPILE_SHADERS=OFF -DNOVELTEA_PREBUILT_SHADER_ASSET_ROOT="${{ github.workspace }}/build/prebuilt-shader-assets" -DBUILD_TESTING=ON -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build --preset linux-debug

      - name: Enforce C++ runtime and dependency policy
        run: cmake --build --preset linux-debug --target cxx-policy

      - name: Enable RmlUi base-direct compat fallback
        run: touch build/linux-debug/rmlui-base-direct-compat.enabled

      - name: Unit tests
        run: xvfb-run -a ctest --test-dir build/linux-debug --output-on-failure

      - name: Upload headless editor tool
        uses: actions/upload-artifact@v7
        with:
          name: noveltea-linux-editor-tool
          path: build/linux-debug/tools/editor_tool/noveltea-editor-tool
          if-no-files-found: error

      - name: Headless sandbox smoke
        run: |
          xvfb-run -a ./build/linux-debug/apps/sandbox/noveltea-sandbox --demo all --frames 180
          xvfb-run -a ./build/linux-debug/apps/sandbox/noveltea-sandbox --demo none --rmlui-document project:/rmlui/lua_demo.rml --frames 3 2>&1 | tee /tmp/noveltea-rmlui-lua.log
          grep -q RMLUI_LUA_TEST_OK /tmp/noveltea-rmlui-lua.log
          mkdir -p /tmp/noveltea-package
          cp ./build/linux-debug/apps/sandbox/noveltea-sandbox /tmp/noveltea-package/
          cp -R ./build/linux-debug/runtime-assets /tmp/noveltea-package/assets
          cd /tmp
          xvfb-run -a /tmp/noveltea-package/noveltea-sandbox --demo all --frames 180

  linux-sanitize:
    name: Linux ASan / UBSan robustness
    runs-on: ubuntu-24.04
    needs: shader-assets
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build ccache cmake pkg-config curl zip unzip tar git \
            xvfb libgl1-mesa-dev libegl1-mesa-dev libx11-dev libxext-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev libxkbcommon-dev libwayland-dev \
            wayland-protocols libltdl-dev libxtst-dev autoconf automake autoconf-archive \
            libtool bison flex

      - name: Cache vcpkg SDK and binaries
        uses: actions/cache@v5
        with:
          path: |
            .cache/vcpkg
            .cache/vcpkg-binary
          key: ${{ runner.os }}-x64-vcpkg-sanitize-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'CMakePresets.json', 'cmake/NovelTeaLua.cmake', 'cmake/NovelTeaSanitizers.cmake', 'cmake/vcpkg-triplets/**') }}
          restore-keys: |
            ${{ runner.os }}-x64-vcpkg-sanitize-

      - name: Cache sanitizer vcpkg installed tree
        uses: actions/cache@v5
        with:
          path: build/linux-sanitize/vcpkg_installed
          key: ${{ runner.os }}-x64-vcpkg-installed-linux-sanitize-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'CMakePresets.json', 'cmake/NovelTeaLua.cmake', 'cmake/NovelTeaSanitizers.cmake', 'cmake/vcpkg-triplets/**') }}
          restore-keys: |
            ${{ runner.os }}-x64-vcpkg-installed-linux-sanitize-

      - name: Cache sanitizer compiler outputs
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-linux-sanitize-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-linux-sanitize-

      - name: Bootstrap vcpkg
        run: |
          if [ ! -d "$VCPKG_ROOT/.git" ]; then
            git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
          fi
          "$VCPKG_ROOT/bootstrap-vcpkg.sh"

      - name: Download shader assets
        uses: actions/download-artifact@v7
        with:
          name: noveltea-shader-assets
          path: build/prebuilt-shader-assets

      - name: Configure sanitizer build
        run: cmake --preset linux-sanitize -G Ninja -DNOVELTEA_COMPILE_SHADERS=OFF -DNOVELTEA_PREBUILT_SHADER_ASSET_ROOT="${{ github.workspace }}/build/prebuilt-shader-assets" -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build sanitizer targets
        run: cmake --build --preset linux-sanitize

      - name: Report sanitizer compiler cache
        if: always()
        run: ccache --show-stats

      - name: Run strict ASan, LeakSanitizer, UBSan, and parser fuzz smoke tests
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          xvfb-run -a ctest --test-dir build/linux-sanitize --output-on-failure \
            -E 'noveltea_(rmlui_(readback|feature_fixtures|resize_readback)_(capture|verify)|presentation_readback_(capture|verify)|world_(presentation|transition)_readback_(capture|verify)|sandbox_runtime_.*_smoke)'

      - name: Run instrumented GPU and sandbox smoke tests
        env:
          ASAN_OPTIONS: detect_leaks=0:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          xvfb-run -a ctest --test-dir build/linux-sanitize --output-on-failure \
            -R 'noveltea_(rmlui_(readback|feature_fixtures|resize_readback)_(capture|verify)|presentation_readback_(capture|verify)|world_(presentation|transition)_readback_(capture|verify)|sandbox_runtime_.*_smoke)'

  windows:
    name: Windows C++ policy
    runs-on: windows-2025
    needs: shader-assets
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up MSVC developer environment
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Restore repository-managed vcpkg environment
        shell: pwsh
        run: |
          # The MSVC developer environment may expose Visual Studio's bundled
          # vcpkg. Keep CI on the cached checkout used by this repository.
          "VCPKG_ROOT=${{ github.workspace }}/.cache/vcpkg" >> $env:GITHUB_ENV

      - name: Install compiler cache
        shell: pwsh
        run: choco install ccache --yes --no-progress

      - name: Cache vcpkg SDK and binaries
        uses: actions/cache@v5
        with:
          path: |
            .cache/vcpkg
            .cache/vcpkg-binary
            build/windows-release/vcpkg_installed
          key: windows-x64-vcpkg-policy-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'CMakePresets.json', 'cmake/vcpkg-triplets/**') }}
          restore-keys: |
            windows-x64-vcpkg-policy-

      - name: Cache Windows compiler outputs
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: windows-x64-ccache-msvc-${{ github.sha }}
          restore-keys: |
            windows-x64-ccache-msvc-

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          if (!(Test-Path "$env:VCPKG_ROOT/.git")) {
            git clone https://github.com/microsoft/vcpkg "$env:VCPKG_ROOT"
          }
          & "$env:VCPKG_ROOT/bootstrap-vcpkg.bat"

      - name: Download shader assets
        uses: actions/download-artifact@v7
        with:
          name: noveltea-shader-assets
          path: build/prebuilt-shader-assets

      - name: Configure Windows release
        shell: pwsh
        run: cmake --preset windows-release -G Ninja -DNOVELTEA_COMPILE_SHADERS=OFF -DNOVELTEA_PREBUILT_SHADER_ASSET_ROOT="${{ github.workspace }}/build/prebuilt-shader-assets" -DBUILD_TESTING=OFF -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build shipped Windows targets
        shell: pwsh
        run: cmake --build --preset windows-release --target noveltea-player noveltea-sandbox noveltea-editor-tool

      - name: Report Windows compiler cache
        if: always()
        shell: pwsh
        run: ccache --show-stats

      - name: Enforce Windows C++ runtime and dependency policy
        shell: pwsh
        run: cmake --build --preset windows-release --target cxx-policy

  web:
    name: Web / Emscripten
    runs-on: ubuntu-24.04
    needs: [shader-assets, linux]
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install root pnpm dependencies
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            ccache \
            cmake \
            curl \
            zip \
            unzip \
            tar \
            git \
            autoconf \
            automake \
            autoconf-archive \
            libtool \
            bison \
            flex

      - name: Cache Emscripten SDK
        id: cache-emsdk
        uses: actions/cache@v5
        with:
          path: .cache/emsdk
          key: ${{ runner.os }}-emsdk-${{ env.EMSDK_VERSION }}

      - name: Install Emscripten
        if: steps.cache-emsdk.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/emscripten-core/emsdk.git "${{ github.workspace }}/.cache/emsdk"
          cd "${{ github.workspace }}/.cache/emsdk"
          ./emsdk install $EMSDK_VERSION
          ./emsdk activate $EMSDK_VERSION

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-emscripten-${{ env.EMSDK_VERSION }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-emscripten-${{ env.EMSDK_VERSION }}-

      - name: Download shader assets
        uses: actions/download-artifact@v7
        with:
          name: noveltea-shader-assets
          path: build/prebuilt-shader-assets

      - name: Download headless editor tool
        uses: actions/download-artifact@v7
        with:
          name: noveltea-linux-editor-tool
          path: build/linux-debug/tools/editor_tool

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install root workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Download checksum-pinned bundletool
        run: |
          mkdir -p build/tools
          curl -fL -o build/tools/bundletool-all-1.18.1.jar https://github.com/google/bundletool/releases/download/1.18.1/bundletool-all-1.18.1.jar
          echo '675786493983787ffa11550bdb7c0715679a44e1643f3ff980a529e9c822595c  build/tools/bundletool-all-1.18.1.jar' | sha256sum -c -
          chmod +x build/linux-debug/tools/editor_tool/noveltea-editor-tool

      - name: Configure and build web release preview
        env:
          EMSDK: ${{ github.workspace }}/.cache/emsdk
        run: |
          source "$EMSDK/emsdk_env.sh"
          emcmake cmake --preset web-release -G Ninja -DNOVELTEA_COMPILE_SHADERS=OFF -DNOVELTEA_PREBUILT_SHADER_ASSET_ROOT="${{ github.workspace }}/build/prebuilt-shader-assets" -DBUILD_TESTING=OFF -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build --preset web-release --target noveltea-sandbox
          cmake --build --preset web-release --target cxx-policy
          test -f build/web-release/apps/sandbox/index.data
          test -f build/web-release/apps/sandbox/index.html
          test -f build/web-release/apps/sandbox/index.js
          test -f build/web-release/apps/sandbox/index.wasm
          grep -q '/assets/project/rmlui/lua_demo.rml' build/web-release/apps/sandbox/index.js
          grep -q '/assets/project/rmlui/lua_demo.lua' build/web-release/apps/sandbox/index.js

      - name: Web profile smoke
        env:
          EMSDK: ${{ github.workspace }}/.cache/emsdk
        run: |
          source "$EMSDK/emsdk_env.sh"
          emcmake cmake --preset web-profile -G Ninja -DNOVELTEA_COMPILE_SHADERS=OFF -DNOVELTEA_PREBUILT_SHADER_ASSET_ROOT="${{ github.workspace }}/build/prebuilt-shader-assets" -DBUILD_TESTING=OFF -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build --preset web-profile --target noveltea-sandbox
          pnpm run web:smoke:profile

      - name: Upload web release preview
        uses: actions/upload-artifact@v7
        with:
          name: noveltea-web-release-preview
          path: build/web-release/apps/sandbox
          if-no-files-found: error

  android:
    name: Android
    runs-on: ubuntu-24.04
    needs: [shader-assets, linux]
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            ccache \
            cmake \
            curl \
            zip \
            unzip \
            tar \
            git \
            autoconf \
            automake \
            autoconf-archive \
            libtool \
            bison \
            flex

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses

      - name: Cache Android SDK packages
        id: cache-android-sdk
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.ANDROID_HOME }}/ndk/${{ env.ANDROID_NDK_VERSION }}
            ${{ env.ANDROID_HOME }}/cmake/${{ env.ANDROID_CMAKE_VERSION }}
          key: ${{ runner.os }}-android-sdk-android${{ env.ANDROID_API_LEVEL }}-buildtools${{ env.ANDROID_BUILD_TOOLS_VERSION }}-cmake${{ env.ANDROID_CMAKE_VERSION }}-ndk${{ env.ANDROID_NDK_VERSION }}

      - name: Install Android SDK packages
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS_VERSION}" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "cmake;${ANDROID_CMAKE_VERSION}"

      - name: Cache SDL3 Android AAR
        id: cache-sdl3-aar
        uses: actions/cache@v5
        with:
          path: android/app/libs/SDL3-3.4.10.aar
          key: ${{ runner.os }}-sdl3-aar-3.4.10

      - name: Download SDL3 Android AAR
        if: steps.cache-sdl3-aar.outputs.cache-hit != 'true'
        run: |
          mkdir -p android/app/libs .cache/sdl3-android
          curl -L \
            -o .cache/sdl3-android/SDL3-devel-3.4.10-android.zip \
            https://github.com/libsdl-org/SDL/releases/download/release-3.4.10/SDL3-devel-3.4.10-android.zip
          unzip -p \
            .cache/sdl3-android/SDL3-devel-3.4.10-android.zip \
            SDL3-3.4.10.aar \
            > android/app/libs/SDL3-3.4.10.aar

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-android-ndk${{ env.ANDROID_NDK_VERSION }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-android-ndk${{ env.ANDROID_NDK_VERSION }}-

      - name: Download shader assets
        uses: actions/download-artifact@v7
        with:
          name: noveltea-shader-assets
          path: build/prebuilt-shader-assets

      - name: Download shader compiler
        run: |
          SHADERC_DIR="${{ github.workspace }}/.cache/shaderc"
          mkdir -p "$SHADERC_DIR"
          curl -fL \
            -o "$SHADERC_DIR/bgfx-shaderc-linux-x64.tar.gz" \
            https://github.com/Cruel/nt-tools/releases/download/r1/bgfx-shaderc-linux-x64.tar.gz
          tar -xzf "$SHADERC_DIR/bgfx-shaderc-linux-x64.tar.gz" \
            -C "$SHADERC_DIR"
          test -x "$SHADERC_DIR/bin/shaderc"
          test -f "$SHADERC_DIR/include/bgfx/bgfx_shader.sh"

      - name: Download headless editor tool
        uses: actions/download-artifact@v7
        with:
          name: noveltea-linux-editor-tool
          path: build/linux-debug/tools/editor_tool

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install root workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Download checksum-pinned bundletool
        run: |
          mkdir -p build/tools
          curl -fL -o build/tools/bundletool-all-1.18.1.jar https://github.com/google/bundletool/releases/download/1.18.1/bundletool-all-1.18.1.jar
          echo '675786493983787ffa11550bdb7c0715679a44e1643f3ff980a529e9c822595c  build/tools/bundletool-all-1.18.1.jar' | sha256sum -c -
          chmod +x build/linux-debug/tools/editor_tool/noveltea-editor-tool

      - name: Build Android debug APK
        working-directory: android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.ANDROID_NDK_VERSION }}
        run: ./gradlew --no-daemon :app:assembleDebug -PnovelteaAbi=x86_64 -PnovelteaCompileShaders=OFF -PnovelteaPrebuiltShaderAssetRoot="${{ github.workspace }}/build/prebuilt-shader-assets" -PnovelteaUseCcache=true

      - name: Enforce Android C++ runtime and dependency policy
        run: |
          cmake -DSOURCE_ROOT="$GITHUB_WORKSPACE" -DALLOWLIST="$GITHUB_WORKSPACE/cmake/cxx-policy-allowlist.txt" -P "$GITHUB_WORKSPACE/cmake/CheckCxxRuntimePolicy.cmake"
          cmake -DSOURCE_ROOT="$GITHUB_WORKSPACE" -P "$GITHUB_WORKSPACE/cmake/VerifyCxxRuntimePolicyChecker.cmake"
          cmake -DSOURCE_ROOT="$GITHUB_WORKSPACE" -DALLOWLIST="$GITHUB_WORKSPACE/cmake/json-boundary-allowlist.txt" -P "$GITHUB_WORKSPACE/cmake/CheckJsonBoundaryPolicy.cmake"
          cmake -DSOURCE_ROOT="$GITHUB_WORKSPACE" -P "$GITHUB_WORKSPACE/cmake/VerifyJsonBoundaryPolicyChecker.cmake"
          build_dir=$(find android/app/.cxx/Debug -path '*/x86_64/compile_commands.json' -printf '%T@ %h\n' | sort -nr | head -1 | cut -d' ' -f2-)
          test -n "$build_dir"
          cmake -DBUILD_DIR="$build_dir" -DPLATFORM_NAME=Android -P cmake/VerifyDependencyCompilerPolicy.cmake

      - name: Verify Android packaged assets
        working-directory: android
        run: |
          unzip -l app/build/outputs/apk/debug/app-debug.apk | grep -E 'assets/system/shaders/bgfx/essl-300/triangle.vs.bin'
          for shader in triangle quad text imgui rmlui; do
            unzip -l app/build/outputs/apk/debug/app-debug.apk | grep -E "assets/system/shaders/bgfx/essl-300/${shader}\.vs\.bin"
            unzip -l app/build/outputs/apk/debug/app-debug.apk | grep -E "assets/system/shaders/bgfx/essl-300/${shader}\.fs\.bin"
          done
          unzip -l app/build/outputs/apk/debug/app-debug.apk | grep -E 'lib/x86_64/libnoveltea-player.so'
          ! unzip -l app/build/outputs/apk/debug/app-debug.apk | grep -Eiq 'sandbox|assets/project|lua_demo'

      - name: Package immutable x86_64 Android player template
        run: cmake -DNOVELTEA_RELEASE_TAG=ci-${GITHUB_SHA} -DNOVELTEA_ANDROID_ABI=x86_64 -DNOVELTEA_ANDROID_FLAVOR=debug -DNOVELTEA_BUNDLETOOL_JAR="${{ github.workspace }}/build/tools/bundletool-all-1.18.1.jar" -P cmake/PackageNovelTeaAndroidPlayerTemplate.cmake

      - name: Verify prebuilt Android player template
        run: |
          template_root="build/package/android-x86_64-debug/source/android"
          test -f "$template_root/prebuilt-native/x86_64/libnoveltea-player.so"
          test -f "$template_root/prebuilt-native/x86_64/libSDL3.so"
          test -f "$template_root/prebuilt-system/fonts/LiberationSans.ttf"
          test ! -e "build/package/android-x86_64-debug/source/CMakeLists.txt"
          test ! -e "build/package/android-x86_64-debug/source/engine"
          test ! -e "build/package/android-x86_64-debug/source/apps"
          node -e '
            const descriptor = require("./build/package/android-x86_64-debug/template.json");
            if (descriptor.host.tools.includes("android-ndk") || descriptor.host.tools.includes("cmake")) process.exit(1);
            if (!descriptor.host.tools.includes("java") || !descriptor.host.tools.includes("android-sdk")) process.exit(1);
          '
      - name: Export fixture revisions through public project export CLI
        env:
          NOVELTEA_EDITOR_TOOL: ${{ github.workspace }}/build/linux-debug/tools/editor_tool/noveltea-editor-tool
        run: |
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          test -f "$ANDROID_SDK_ROOT/platforms/android-${ANDROID_API_LEVEL}/android.jar"
          test -x "$ANDROID_SDK_ROOT/build-tools/${ANDROID_BUILD_TOOLS_VERSION}/aapt2"
          config="$RUNNER_TEMP/noveltea-android-export-config.json"
          SHADERC="${{ github.workspace }}/.cache/shaderc/bin/shaderc" \
          BGFX_SHADER_INCLUDE_DIR="${{ github.workspace }}/.cache/shaderc/include/bgfx" \
          pnpm android:export-config -- --output "$config"

          template="${{ github.workspace }}/dist/noveltea-player-template-ci-${GITHUB_SHA}-android-x86_64-debug.tar.gz"
          for revision in 1 2; do
            fixture_root="$RUNNER_TEMP/noveltea-android-fixture-v${revision}"
            output="${{ github.workspace }}/dist/android-fixture-v${revision}"
            pnpm android:fixture -- \
              --root "$fixture_root" \
              --revision "$revision" \
              --abi x86_64 \
              --flavor debug
            pnpm project:export -- \
              --template "$template" \
              --project "$fixture_root/project.json" \
              --profile canonical-android-debug \
              --output "$output" \
              --config "$config" \
              --json
          done

      - name: Upload immutable debug template and export reports
        uses: actions/upload-artifact@v7
        with:
          name: noveltea-android-debug-export
          path: |
            dist/noveltea-player-template-*-android-x86_64-debug.tar.gz
            dist/android-x86_64-debug.*
          if-no-files-found: error

      - name: Upload first exported APK revision
        uses: actions/upload-artifact@v7
        with:
          name: noveltea-android-fixture-v1
          path: dist/android-fixture-v1
          if-no-files-found: error

      - name: Upload updated exported APK revision
        uses: actions/upload-artifact@v7
        with:
          name: noveltea-android-fixture-v2
          path: dist/android-fixture-v2
          if-no-files-found: error

  android-emulator:
    name: Android emulator API ${{ matrix.api }}
    runs-on: ubuntu-24.04
    needs: android
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        api: [24, 35]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - name: Download first exported APK revision
        uses: actions/download-artifact@v7
        with:
          name: noveltea-android-fixture-v1
          path: android-fixture-v1
      - name: Download updated exported APK revision
        uses: actions/download-artifact@v7
        with:
          name: noveltea-android-fixture-v2
          path: android-fixture-v2
      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run lifecycle/update smoke test on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api }}
          target: google_apis
          arch: x86_64
          avd-name: noveltea-ci
          force-avd-creation: true
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -no-snapshot -wipe-data
          emulator-boot-timeout: 600
          # android-emulator-runner executes each newline as a separate shell command,
          # so variable assignments cannot be shared across lines here.
          script: >-
            .github/android-emulator-smoke.sh
            "$(find android-fixture-v1 -name '*.apk' -print -quit)"
            "$(find android-fixture-v2 -name '*.apk' -print -quit)"

  editor:
    name: Editor / Electron
    runs-on: ubuntu-24.04
    needs: web
    timeout-minutes: 90
    env:
      NOVELTEA_EDITOR_TOOL_PATH: ${{ github.workspace }}/build/editor-tool/noveltea-editor-tool
      NOVELTEA_RELEASE_TAG: 0.0.0-ci.${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            cmake \
            pkg-config \
            curl \
            zip \
            unzip \
            tar \
            git \
            xvfb \
            rpm \
            fakeroot \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxdamage-dev \
            libxfixes-dev \
            libcups2-dev \
            libnss3-dev \
            libnspr4-dev \
            libatk1.0-dev \
            libatk-bridge2.0-dev \
            libgtk-3-dev \
            libdrm-dev \
            libasound2-dev \
            libgbm-dev \
            libpango1.0-dev \
            libcairo2-dev

      - name: Download web release preview
        uses: actions/download-artifact@v7
        with:
          name: noveltea-web-release-preview
          path: build/web-release/apps/sandbox

      - name: Download native editor tool
        uses: actions/download-artifact@v7
        with:
          name: noveltea-linux-editor-tool
          path: build/editor-tool

      - name: Prepare native editor tool
        run: chmod +x build/editor-tool/noveltea-editor-tool

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

      - name: Check
        run: pnpm editor:check

      - name: Test
        run: pnpm editor:test

      - name: Build
        run: pnpm editor:build

      - name: Verify standalone project compiler
        run: |
          OUTPUT="$RUNNER_TEMP/noveltea-minimal-compiled.json"
          pnpm project:compile -- \
            --project editor/src/renderer/test/fixtures/project-compiler-cli/minimal-project.json \
            --output "$OUTPUT"
          node -e "const fs=require('node:fs'); const actual=fs.readFileSync(process.argv[1],'utf8'); const expected=fs.readFileSync(process.argv[2],'utf8').trimEnd(); if(actual!==expected){console.error('Standalone project compiler output differs from the canonical golden.'); process.exit(1)}" \
            "$OUTPUT" \
            editor/src/renderer/test/fixtures/compiled-project-golden/minimal.json

      - name: Verify packaged engine preview
        run: |
          test -f build/web-release/apps/sandbox/index.html
          test -f build/web-release/apps/sandbox/index.js
          test -f build/web-release/apps/sandbox/index.wasm
          test -f build/web-release/apps/sandbox/index.data

      - name: Build and verify portable stage
        run: pnpm editor:stage

      - name: Build and verify packaged application
        run: pnpm editor:package

      - name: Run permanent package smoke
        run: pnpm editor:package:smoke
