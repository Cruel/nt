name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  VCPKG_ROOT: ${{ github.workspace }}/.cache/vcpkg
  VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.cache/vcpkg-binary,readwrite
  CMAKE_BUILD_PARALLEL_LEVEL: 2
  VCPKG_MAX_CONCURRENCY: 2
  RELEASE_TAG: ${{ github.ref_name }}
  EMSDK_VERSION: 6.0.0
  CCACHE_DIR: ${{ github.workspace }}/.cache/ccache
  CCACHE_MAXSIZE: 500M
  CCACHE_BASEDIR: ${{ github.workspace }}
  ANDROID_API_LEVEL: "35"
  ANDROID_BUILD_TOOLS_VERSION: "35.0.0"
  ANDROID_CMAKE_VERSION: "3.31.6"
  ANDROID_NDK_VERSION: "28.2.13676358"

jobs:
  shader-assets:
    name: Shader assets
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake curl zip unzip tar git

      - name: Download shaderc
        run: |
          SHADERC_DIR="${{ github.workspace }}/.cache/shaderc"
          mkdir -p "$SHADERC_DIR"
          curl -L \
            -o "$SHADERC_DIR/bgfx-shaderc-linux-x64.tar.gz" \
            https://github.com/Cruel/nt-tools/releases/download/r1/bgfx-shaderc-linux-x64.tar.gz
          tar -xzf "$SHADERC_DIR/bgfx-shaderc-linux-x64.tar.gz" \
            -C "$SHADERC_DIR"
          SHADERC="$SHADERC_DIR/bin/shaderc"
          test -x "$SHADERC"
          echo "SHADERC=$SHADERC" >> "$GITHUB_ENV"
          echo "BGFX_SHADER_INCLUDE=$SHADERC_DIR/include/bgfx" >> "$GITHUB_ENV"

      - name: Compile and verify shader assets
        run: |
          SHADERC="${{ env.SHADERC }}"
          BGFX_SHADER_INCLUDE="${{ env.BGFX_SHADER_INCLUDE }}"
          cmake -DNOVELTEA_SHADERC_EXECUTABLE="$SHADERC" -DNOVELTEA_SHADER_SOURCE_DIR="${{ github.workspace }}/engine/shaders/bgfx" -DNOVELTEA_SHADER_OUTPUT_ROOT="${{ github.workspace }}/build/generated-assets/shaders" '-DNOVELTEA_SHADER_VARIANTS=glsl-120;essl-100;essl-300' -DNOVELTEA_BGFX_SHADER_INCLUDE_DIR="$BGFX_SHADER_INCLUDE" -P "${{ github.workspace }}/cmake/CompileNovelTeaShaders.cmake"
          cmake -DNOVELTEA_VERIFY_ONLY=ON -DNOVELTEA_SHADER_OUTPUT_ROOT="${{ github.workspace }}/build/generated-assets/shaders" '-DNOVELTEA_SHADER_VARIANTS=glsl-120;essl-100;essl-300' -P "${{ github.workspace }}/cmake/CompileNovelTeaShaders.cmake"

      - name: Upload shader assets
        uses: actions/upload-artifact@v7
        with:
          name: noveltea-release-shader-assets
          path: build/generated-assets/shaders
          if-no-files-found: error

  desktop-sandbox:
    name: Desktop sandbox (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: shader-assets
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: x64
            runner: ubuntu-22.04
            preset: linux-release
            triplet: x64-linux
            host_triplet: x64-linux
          - platform: windows
            arch: x64
            runner: windows-2025
            preset: windows-release
            triplet: x64-windows-static
            host_triplet: x64-windows
          - platform: macos
            arch: arm64
            runner: macos-15
            preset: macos-release
            triplet: arm64-osx
            host_triplet: arm64-osx

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Linux system packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build ccache cmake pkg-config curl zip unzip tar git libgl1-mesa-dev libegl1-mesa-dev libx11-dev libxext-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxkbcommon-dev libwayland-dev wayland-protocols weston libltdl-dev libxtst-dev autoconf automake autoconf-archive libtool bison flex

      - name: Install macOS packages
        if: runner.os == 'macOS'
        run: brew install ninja ccache

      - name: Cache vcpkg SDK
        uses: actions/cache@v5
        with:
          path: |
            .cache/vcpkg
            .cache/vcpkg-binary
          key: ${{ runner.os }}-${{ matrix.arch }}-vcpkg-sdk-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-vcpkg-sdk-

      - name: Cache vcpkg installed
        uses: actions/cache@v5
        with:
          path: build/${{ matrix.preset }}/vcpkg_installed
          key: ${{ runner.os }}-${{ matrix.arch }}-vcpkg-installed-${{ matrix.preset }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'CMakePresets.json', 'cmake/NovelTeaLua.cmake') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-vcpkg-installed-${{ matrix.preset }}-

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          if (!(Test-Path "$env:VCPKG_ROOT/.git")) {
            git clone https://github.com/microsoft/vcpkg "$env:VCPKG_ROOT"
          }
          if ("${{ runner.os }}" -eq "Windows") {
            & "$env:VCPKG_ROOT/bootstrap-vcpkg.bat"
          } else {
            & "$env:VCPKG_ROOT/bootstrap-vcpkg.sh"
          }

      - name: Set up MSVC developer environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Download shader assets
        uses: actions/download-artifact@v7
        with:
          name: noveltea-release-shader-assets
          path: build/prebuilt-shader-assets

      - name: Cache ccache
        if: runner.os != 'Windows'
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-${{ matrix.arch }}-ccache-${{ matrix.preset }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-ccache-${{ matrix.preset }}-

      - name: Build desktop sandbox
        shell: pwsh
        run: |
          $ccacheArgs = @()
          if ("${{ runner.os }}" -ne "Windows") { $ccacheArgs = @("-DCMAKE_C_COMPILER_LAUNCHER=ccache", "-DCMAKE_CXX_COMPILER_LAUNCHER=ccache") }
          cmake --preset ${{ matrix.preset }} -G Ninja `
            -DNOVELTEA_COMPILE_SHADERS=OFF `
            -DNOVELTEA_PREBUILT_SHADER_ASSET_ROOT="${{ github.workspace }}/build/prebuilt-shader-assets" `
            -DBUILD_TESTING=OFF `
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} `
            -DVCPKG_HOST_TRIPLET=${{ matrix.host_triplet }} `
            @ccacheArgs
          cmake --build --preset ${{ matrix.preset }} --target noveltea-sandbox noveltea-player

      - name: Audit player dependency closure
        shell: pwsh
        run: cmake -DNOVELTEA_PLAYER="${{ github.workspace }}/build/${{ matrix.preset }}/apps/player/noveltea-player${{ matrix.platform == 'windows' && '.exe' || '' }}" ${{ matrix.platform == 'linux' && '-DNOVELTEA_MAX_GLIBC_VERSION=2.35' || '' }} -P cmake/AuditNovelTeaPlayerDependencies.cmake

      - name: Package player template and symbols
        shell: pwsh
        run: cmake -DNOVELTEA_TEMPLATE_PRESET=${{ matrix.preset }} -DNOVELTEA_TEMPLATE_PLATFORM=${{ matrix.platform }} -DNOVELTEA_TEMPLATE_ARCH=${{ matrix.arch }} -DNOVELTEA_RELEASE_TAG="$env:RELEASE_TAG" -P cmake/PackageNovelTeaPlayerTemplate.cmake

      - name: Set up pnpm for desktop export smoke
        if: runner.os == 'Windows' || matrix.platform == 'linux' || matrix.platform == 'macos'
        uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - name: Set up Node.js for desktop export smoke
        if: runner.os == 'Windows' || matrix.platform == 'linux' || matrix.platform == 'macos'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: editor/pnpm-lock.yaml

      - name: Install editor dependencies for desktop export smoke
        if: runner.os == 'Windows' || matrix.platform == 'linux' || matrix.platform == 'macos'
        working-directory: editor
        run: pnpm install --frozen-lockfile

      - name: Install appimagetool for Linux export smoke
        if: matrix.platform == 'linux'
        run: |
          curl -L --fail --retry 3 \
            -o "$RUNNER_TEMP/appimagetool.AppImage" \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x "$RUNNER_TEMP/appimagetool.AppImage"

      - name: Finalize and launch Windows portable export
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: editor
        env:
          NOVELTEA_WINDOWS_TEMPLATE_ARCHIVE: ${{ github.workspace }}\dist\noveltea-player-template-${{ env.RELEASE_TAG }}-windows-x64-release.zip
          NOVELTEA_WINDOWS_RUNTIME_PACKAGE: ${{ github.workspace }}\build\windows-release\runtime-assets\project\projects\runtime_phase9_package.ntpkg
        run: pnpm exec vitest run src/renderer/test/platform-staging-service.test.ts

      - name: Finalize and launch Linux portable export on X11
        if: matrix.platform == 'linux'
        working-directory: editor
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          NOVELTEA_LINUX_TEMPLATE_ARCHIVE: ${{ github.workspace }}/dist/noveltea-player-template-${{ env.RELEASE_TAG }}-linux-x64-release.tar.gz
          NOVELTEA_LINUX_RUNTIME_PACKAGE: ${{ github.workspace }}/build/linux-release/runtime-assets/project/projects/runtime_phase9_package.ntpkg
          NOVELTEA_LINUX_APPIMAGE_TOOL: ${{ runner.temp }}/appimagetool.AppImage
        run: xvfb-run -a pnpm exec vitest run src/renderer/test/platform-staging-service.test.ts

      - name: Finalize and launch Linux portable export on Wayland
        if: matrix.platform == 'linux'
        working-directory: editor
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          NOVELTEA_LINUX_TEMPLATE_ARCHIVE: ${{ github.workspace }}/dist/noveltea-player-template-${{ env.RELEASE_TAG }}-linux-x64-release.tar.gz
          NOVELTEA_LINUX_RUNTIME_PACKAGE: ${{ github.workspace }}/build/linux-release/runtime-assets/project/projects/runtime_phase9_package.ntpkg
          NOVELTEA_LINUX_APPIMAGE_TOOL: ${{ runner.temp }}/appimagetool.AppImage
          SDL_VIDEODRIVER: wayland
          WAYLAND_DISPLAY: wayland-noveltea
          XDG_RUNTIME_DIR: ${{ runner.temp }}/noveltea-weston-runtime
        run: |
          mkdir -p "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"
          weston --backend=headless-backend.so --socket="$WAYLAND_DISPLAY" --idle-time=0 >"$RUNNER_TEMP/weston.log" 2>&1 &
          weston_pid=$!
          trap 'kill "$weston_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 40); do
            test -S "$XDG_RUNTIME_DIR/$WAYLAND_DISPLAY" && break
            sleep 0.25
          done
          test -S "$XDG_RUNTIME_DIR/$WAYLAND_DISPLAY" || { cat "$RUNNER_TEMP/weston.log"; exit 1; }
          pnpm exec vitest run src/renderer/test/platform-staging-service.test.ts

      - name: Finalize and launch macOS app bundle export
        if: matrix.platform == 'macos'
        working-directory: editor
        env:
          NOVELTEA_MACOS_TEMPLATE_ARCHIVE: ${{ github.workspace }}/dist/noveltea-player-template-${{ env.RELEASE_TAG }}-macos-arm64-release.tar.gz
          NOVELTEA_MACOS_RUNTIME_PACKAGE: ${{ github.workspace }}/build/macos-release/runtime-assets/project/projects/runtime_phase9_package.ntpkg
        run: pnpm exec vitest run src/renderer/test/platform-staging-service.test.ts

      - name: Attest player template archives
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: dist/noveltea-player-template-*

      - name: Stage desktop sandbox artifact
        shell: pwsh
        env:
          NOVELTEA_RELEASE_PLATFORM: ${{ matrix.platform }}
          NOVELTEA_RELEASE_ARCH: ${{ matrix.arch }}
        run: cmake -DNOVELTEA_PACKAGE_KIND=desktop-sandbox -DNOVELTEA_RELEASE_TAG="$env:RELEASE_TAG" -P cmake/PackageNovelTeaRelease.cmake

      - name: Upload desktop sandbox artifact
        uses: actions/upload-artifact@v7
        with:
          name: noveltea-desktop-sandbox-${{ matrix.platform }}-${{ matrix.arch }}-release-dist
          path: dist/*
          if-no-files-found: error

  web:
    name: Web release
    runs-on: ubuntu-24.04
    needs: shader-assets
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build ccache cmake curl zip unzip tar git autoconf automake autoconf-archive libtool bison flex

      - name: Cache Emscripten SDK
        id: cache-emsdk
        uses: actions/cache@v5
        with:
          path: .cache/emsdk
          key: ${{ runner.os }}-emsdk-${{ env.EMSDK_VERSION }}

      - name: Install Emscripten
        if: steps.cache-emsdk.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/emscripten-core/emsdk.git "${{ github.workspace }}/.cache/emsdk"
          cd "${{ github.workspace }}/.cache/emsdk"
          ./emsdk install $EMSDK_VERSION
          ./emsdk activate $EMSDK_VERSION

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-emscripten-${{ env.EMSDK_VERSION }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-emscripten-${{ env.EMSDK_VERSION }}-

      - name: Download shader assets
        uses: actions/download-artifact@v7
        with:
          name: noveltea-release-shader-assets
          path: build/prebuilt-shader-assets

      - name: Build Web release
        env:
          EMSDK: ${{ github.workspace }}/.cache/emsdk
        run: |
          source "$EMSDK/emsdk_env.sh"
          emcmake cmake --preset web-release -G Ninja -DNOVELTEA_COMPILE_SHADERS=OFF -DNOVELTEA_PREBUILT_SHADER_ASSET_ROOT="${{ github.workspace }}/build/prebuilt-shader-assets" -DBUILD_TESTING=OFF -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build --preset web-release --target noveltea-player

      - name: Verify release player surface
        run: |
          ! grep -aE 'noveltea_preview_|noveltea_runtime_(set_variable|give_object|teleport_room|debug_snapshot)|MessageChannel' build/web-release/apps/player/player.js

      - name: Package Web player template
        run: cmake -DNOVELTEA_TEMPLATE_PRESET=web-release -DNOVELTEA_RELEASE_TAG="$RELEASE_TAG" -P cmake/PackageNovelTeaWebPlayerTemplate.cmake

      - name: Attest Web player template
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: dist/noveltea-player-template-*-web-wasm32-release.zip

      - name: Stage Web bundle
        run: .github/package-release.sh web "$RELEASE_TAG"

      - name: Upload Web release preview
        uses: actions/upload-artifact@v7
        with:
          name: noveltea-web-release-preview
          path: build/web-release/apps/player
          if-no-files-found: error

      - name: Upload Web release artifact
        uses: actions/upload-artifact@v7
        with:
          name: noveltea-web-release-dist
          path: dist/*
          if-no-files-found: error

  android:
    name: Android release
    runs-on: ubuntu-24.04
    needs: shader-assets
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build ccache cmake curl zip unzip tar git autoconf automake autoconf-archive libtool bison flex

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses

      - name: Cache Android SDK packages
        id: cache-android-sdk
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.ANDROID_HOME }}/ndk/${{ env.ANDROID_NDK_VERSION }}
            ${{ env.ANDROID_HOME }}/cmake/${{ env.ANDROID_CMAKE_VERSION }}
          key: ${{ runner.os }}-android-sdk-android${{ env.ANDROID_API_LEVEL }}-buildtools${{ env.ANDROID_BUILD_TOOLS_VERSION }}-cmake${{ env.ANDROID_CMAKE_VERSION }}-ndk${{ env.ANDROID_NDK_VERSION }}

      - name: Install Android SDK packages
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platform-tools" "platforms;android-${ANDROID_API_LEVEL}" "build-tools;${ANDROID_BUILD_TOOLS_VERSION}" "ndk;${ANDROID_NDK_VERSION}" "cmake;${ANDROID_CMAKE_VERSION}"

      - name: Cache SDL3 Android AAR
        id: cache-sdl3-aar
        uses: actions/cache@v5
        with:
          path: android/app/libs/SDL3-3.4.10.aar
          key: ${{ runner.os }}-sdl3-aar-3.4.10

      - name: Download SDL3 Android AAR
        if: steps.cache-sdl3-aar.outputs.cache-hit != 'true'
        run: |
          mkdir -p android/app/libs .cache/sdl3-android
          curl -L -o .cache/sdl3-android/SDL3-devel-3.4.10-android.zip https://github.com/libsdl-org/SDL/releases/download/release-3.4.10/SDL3-devel-3.4.10-android.zip
          unzip -p .cache/sdl3-android/SDL3-devel-3.4.10-android.zip SDL3-3.4.10.aar > android/app/libs/SDL3-3.4.10.aar

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-android-ndk${{ env.ANDROID_NDK_VERSION }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-android-ndk${{ env.ANDROID_NDK_VERSION }}-

      - name: Download shader assets
        uses: actions/download-artifact@v7
        with:
          name: noveltea-release-shader-assets
          path: build/prebuilt-shader-assets

      - name: Build unsigned Android player template source
        working-directory: android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.ANDROID_NDK_VERSION }}
        run: |
          ./gradlew --no-daemon :app:assembleRelease -PnovelteaAbi=arm64-v8a -PnovelteaCompileShaders=OFF -PnovelteaPrebuiltShaderAssetRoot="${{ github.workspace }}/build/prebuilt-shader-assets" -PnovelteaUseCcache=true
          ./gradlew --no-daemon :app:assembleDebug -PnovelteaAbi=x86_64 -PnovelteaCompileShaders=OFF -PnovelteaPrebuiltShaderAssetRoot="${{ github.workspace }}/build/prebuilt-shader-assets" -PnovelteaUseCcache=true

      - name: Download checksum-pinned bundletool
        run: |
          mkdir -p build/tools
          curl -fL -o build/tools/bundletool-all-1.18.1.jar https://github.com/google/bundletool/releases/download/1.18.1/bundletool-all-1.18.1.jar
          echo '675786493983787ffa11550bdb7c0715679a44e1643f3ff980a529e9c822595c  build/tools/bundletool-all-1.18.1.jar' | sha256sum -c -

      - name: Package official Android player templates
        run: |
          cmake -DNOVELTEA_RELEASE_TAG="$RELEASE_TAG" -DNOVELTEA_ANDROID_ABI=arm64-v8a -DNOVELTEA_ANDROID_FLAVOR=release -DNOVELTEA_BUNDLETOOL_JAR="${{ github.workspace }}/build/tools/bundletool-all-1.18.1.jar" -P cmake/PackageNovelTeaAndroidPlayerTemplate.cmake
          cmake -DNOVELTEA_RELEASE_TAG="$RELEASE_TAG" -DNOVELTEA_ANDROID_ABI=x86_64 -DNOVELTEA_ANDROID_FLAVOR=debug -DNOVELTEA_BUNDLETOOL_JAR="${{ github.workspace }}/build/tools/bundletool-all-1.18.1.jar" -P cmake/PackageNovelTeaAndroidPlayerTemplate.cmake

      - name: Install pnpm and editor dependencies
        uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - name: Install editor dependencies
        working-directory: editor
        run: pnpm install --frozen-lockfile

      - name: Cache vcpkg SDK for headless export tool
        uses: actions/cache@v5
        with:
          path: |
            .cache/vcpkg
            .cache/vcpkg-binary
            build/linux-debug/vcpkg_installed
          key: ${{ runner.os }}-android-release-editor-tool-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Build headless editor export tool
        run: |
          if [ ! -d "$VCPKG_ROOT/.git" ]; then git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT"; fi
          "$VCPKG_ROOT/bootstrap-vcpkg.sh"
          cmake --preset linux-debug -G Ninja -DNOVELTEA_COMPILE_SHADERS=OFF -DNOVELTEA_PREBUILT_SHADER_ASSET_ROOT="${{ github.workspace }}/build/prebuilt-shader-assets" -DBUILD_TESTING=OFF
          cmake --build --preset linux-debug --target noveltea-editor-tool

      - name: Export and inspect release APK plus AAB through editor orchestration
        working-directory: editor
        env:
          NOVELTEA_ANDROID_EXPORT_INTEGRATION: "1"
          NOVELTEA_ANDROID_TEMPLATE_ARCHIVE: ${{ github.workspace }}/dist/noveltea-player-template-${{ env.RELEASE_TAG }}-android-arm64-v8a-release.tar.gz
          NOVELTEA_EDITOR_TOOL: ${{ github.workspace }}/build/linux-debug/tools/editor_tool/noveltea-editor-tool
          NOVELTEA_ANDROID_ABI: arm64-v8a
          NOVELTEA_ANDROID_FLAVOR: release
          NOVELTEA_ANDROID_ARTIFACT: both
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_HOME }}/ndk/${{ env.ANDROID_NDK_VERSION }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_CMAKE_ROOT: ${{ env.ANDROID_HOME }}/cmake/${{ env.ANDROID_CMAKE_VERSION }}
          NOVELTEA_ANDROID_INTEGRATION_ROOT: ${{ runner.temp }}/noveltea-android-release-integration
          NOVELTEA_ANDROID_EXPORT_OUTPUT: ${{ github.workspace }}/dist/android-release-fixture
        run: pnpm vitest run src/renderer/test/android-export-integration.test.ts

      - name: Upload Android release artifact
        uses: actions/upload-artifact@v7
        with:
          name: noveltea-android-release-dist
          path: dist/*
          if-no-files-found: error

  desktop-editor:
    name: Desktop editor (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: web
    timeout-minutes: 90
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: x64
            runner: ubuntu-24.04
          - platform: windows
            arch: x64
            runner: windows-2025
          - platform: macos
            arch: arm64
            runner: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Linux system packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build cmake pkg-config curl zip unzip tar git rpm fakeroot libx11-dev libxext-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxkbcommon-dev libxdamage-dev libxfixes-dev libcups2-dev libnss3-dev libnspr4-dev libatk1.0-dev libatk-bridge2.0-dev libgtk-3-dev libdrm-dev libasound2-dev libgbm-dev libpango1.0-dev libcairo2-dev

      - name: Download web release preview
        uses: actions/download-artifact@v7
        with:
          name: noveltea-web-release-preview
          path: build/web-release/apps/sandbox

      - name: Verify packaged engine preview
        shell: pwsh
        run: |
          foreach ($file in @("index.html", "index.js", "index.wasm", "index.data")) {
            if (!(Test-Path "build/web-release/apps/sandbox/$file")) {
              throw "Missing web preview file: $file"
            }
          }

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: editor/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: editor
        run: pnpm install --frozen-lockfile

      - name: Make editor distributables
        working-directory: editor
        run: pnpm make

      - name: Stage editor distributables
        shell: pwsh
        env:
          NOVELTEA_RELEASE_PLATFORM: ${{ matrix.platform }}
          NOVELTEA_RELEASE_ARCH: ${{ matrix.arch }}
        run: cmake -DNOVELTEA_PACKAGE_KIND=desktop-editor -DNOVELTEA_RELEASE_TAG="$env:RELEASE_TAG" -P cmake/PackageNovelTeaRelease.cmake

      - name: Upload editor release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: noveltea-desktop-editor-${{ matrix.platform }}-${{ matrix.arch }}-release-dist
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs: [desktop-sandbox, web, android, desktop-editor]
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download release assets
        uses: actions/download-artifact@v7
        with:
          pattern: noveltea-*-release-dist
          path: dist
          merge-multiple: true

      - name: Generate player template registry index
        run: node .github/generate-template-registry.mjs dist "$RELEASE_TAG"

      - name: Generate checksums
        run: .github/package-release.sh checksums "$RELEASE_TAG"

      - name: Attest complete player template set
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/noveltea-player-template-*

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          args=(
            "$RELEASE_TAG"
            dist/*
            --verify-tag
            --generate-notes
            --fail-on-no-commits
          )
          if [[ "$RELEASE_TAG" == *-alpha* || "$RELEASE_TAG" == *-beta* || "$RELEASE_TAG" == *-rc* ]]; then
            args+=(--prerelease)
          fi
          gh release create "${args[@]}"
