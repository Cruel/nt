plugins {
    id("com.android.application")
}

android {
    namespace "com.example.noveltea"
    compileSdk 35

    buildFeatures {
        prefab true
    }

    defaultConfig {
        applicationId "com.example.noveltea"
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName "0.1.0"

        externalNativeBuild {
            cmake {
                arguments "-DANDROID_PLATFORM=android-24", "-DNOVELTEA_BUILD_SANDBOX=ON"
            }
        }
        ndk {
            abiFilters "arm64-v8a", "armeabi-v7a", "x86_64"
        }
    }

    buildTypes {
        debug {
            debuggable true
        }
    }

    externalNativeBuild {
        cmake {
            path file("../../CMakeLists.txt")
        }
    }
}

dependencies {
    implementation files("libs/SDL3-3.4.10.aar")
}
