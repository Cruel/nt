<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="screen-orientation" content="landscape">
<title>NovelTea Web Prototype</title>
<style>
  body { margin: 0; overflow: hidden; background: #111; color: #ddd; font-family: sans-serif; }
  canvas { display: block; width: 100vw; height: 100vh; background: #181820; }
  #status { position: fixed; left: 16px; top: 16px; color: #ddd; font-size: 14px; line-height: 1.4; }
  #fps-counter { display: none; position: fixed; left: 16px; bottom: 16px; z-index: 9; padding: 4px 6px; border-radius: 4px; background: rgba(15, 23, 42, 0.84); color: #cbd5e1; font: 11px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; pointer-events: none; }
</style>
</head>
<body>
<canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
<div id="status">NovelTea Web Sandbox<br>Engine loading...</div>
<div id="fps-counter"></div>
<script>
  (function() {
    const params = new URLSearchParams(window.location.search);
    const requestedOrientation = params.get('orientation') === 'portrait' ? 'portrait' : 'landscape';
    document.querySelector('meta[name="screen-orientation"]')?.setAttribute('content', requestedOrientation);
    const tryOrientationLock = () => {
      const orientation = window.screen && window.screen.orientation;
      if (!orientation || typeof orientation.lock !== 'function') return;
      Promise.resolve(orientation.lock(requestedOrientation)).catch(() => undefined);
    };
    document.addEventListener('fullscreenchange', tryOrientationLock);
    document.addEventListener('pointerdown', tryOrientationLock, { once: true });
    const showFps = params.get('showFps') === '1' || params.get('showFps') === 'true';
    let runtimeReady = false;
    let pendingResize = null;
    let appliedResizeKey = '';
    let resizeScheduled = false;
    let dprMediaQuery = null;

    function hideStatus() {
      const status = document.getElementById('status');
      if (status) status.style.display = 'none';
    }

    globalThis.NovelTeaPreviewBridge = {
      send() {},
      markEngineReady() {
        hideStatus();
      },
      setFpsCounter(fps, frameTimeMs, cap) {
        const counter = document.getElementById('fps-counter');
        if (!counter) return;
        if (!showFps || !Number.isFinite(fps) || fps <= 0) {
          counter.style.display = 'none';
          counter.textContent = '';
          return;
        }
        const capText = cap > 0 ? ` engine cap ${cap}, display paced` : ' display paced';
        counter.textContent = fps.toFixed(1) + ' fps · ' + frameTimeMs.toFixed(2) + ' ms ·' + capText;
        counter.style.display = 'block';
      }
    };

    function currentDevicePixelRatio() {
      const dpr = Number(window.devicePixelRatio);
      return Number.isFinite(dpr) && dpr > 0 ? dpr : 1;
    }

    function handleDevicePixelRatioChange() {
      armDevicePixelRatioWatcher();
      resizeCanvas();
    }

    function armDevicePixelRatioWatcher() {
      if (dprMediaQuery) {
        dprMediaQuery.removeEventListener('change', handleDevicePixelRatioChange);
        dprMediaQuery = null;
      }
      if (typeof window.matchMedia !== 'function') return;
      dprMediaQuery = window.matchMedia(`(resolution: ${currentDevicePixelRatio()}dppx)`);
      dprMediaQuery.addEventListener('change', handleDevicePixelRatioChange, { once: true });
    }

    function resizeCanvas() {
      const canvas = document.getElementById('canvas');
      const maxDpr = parseFloat(params.get('maxDpr') || '0') || 0;
      const actualDpr = currentDevicePixelRatio();
      const dpr = maxDpr > 0 ? Math.min(actualDpr, maxDpr) : actualDpr;
      const rect = canvas.getBoundingClientRect();
      const logicalWidth = Math.max(1, Math.round(rect.width));
      const logicalHeight = Math.max(1, Math.round(rect.height));
      const framebufferWidth = Math.max(1, Math.round(logicalWidth * dpr));
      const framebufferHeight = Math.max(1, Math.round(logicalHeight * dpr));
      const scaleX = framebufferWidth / logicalWidth;
      const scaleY = framebufferHeight / logicalHeight;
      if (!runtimeReady) {
        canvas.width = framebufferWidth;
        canvas.height = framebufferHeight;
      }
      pendingResize = { logicalWidth, logicalHeight, framebufferWidth, framebufferHeight, scaleX, scaleY };
      scheduleResizeApply();
    }

    function scheduleResizeApply() {
      if (resizeScheduled) return;
      resizeScheduled = true;
      requestAnimationFrame(() => {
        resizeScheduled = false;
        applyPendingResize();
      });
    }

    function applyPendingResize() {
      if (!pendingResize || !runtimeReady || typeof Module._noveltea_preview_resize !== 'function') return;
      const resize = pendingResize;
      const key = `${resize.logicalWidth}x${resize.logicalHeight}:${resize.framebufferWidth}x${resize.framebufferHeight}:${resize.scaleX}x${resize.scaleY}`;
      if (key === appliedResizeKey) return;
      Module._noveltea_preview_resize(
        resize.logicalWidth,
        resize.logicalHeight,
        resize.framebufferWidth,
        resize.framebufferHeight,
        resize.scaleX,
        resize.scaleY);
      appliedResizeKey = key;
      const gl = typeof GL !== 'undefined' && GL.currentContext ? GL.currentContext.GLctx : null;
      console.log('[surface:web]', {
        devicePixelRatio: window.devicePixelRatio || 1,
        css: `${resize.logicalWidth}x${resize.logicalHeight}`,
        backing: `${canvas.width}x${canvas.height}`,
        drawingBuffer: gl ? `${gl.drawingBufferWidth}x${gl.drawingBufferHeight}` : 'unavailable',
        engineLogical: `${resize.logicalWidth}x${resize.logicalHeight}`,
        engineFramebuffer: `${resize.framebufferWidth}x${resize.framebufferHeight}`,
        engineScale: `${resize.scaleX}x${resize.scaleY}`,
      });
    }

    armDevicePixelRatioWatcher();
    resizeCanvas();
    new ResizeObserver(resizeCanvas).observe(document.getElementById('canvas'));
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('pageshow', resizeCanvas);
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) resizeCanvas();
    });
    requestAnimationFrame(resizeCanvas);

    globalThis.NovelTeaPreviewRuntimeReady = function() {
      runtimeReady = true;
      resizeCanvas();
      scheduleResizeApply();
    };
  })();

  var Module = {
    canvas: document.getElementById('canvas'),
    arguments: (function() {
      const params = new URLSearchParams(window.location.search);
      const args = [];
      const validDemos = new Set(['none', 'render2d', 'rmlui', 'text', 'all']);
      const demo = (params.get('demo') || '').toLowerCase();
      if (validDemos.has(demo)) args.push('--demo', demo);
      const frames = params.get('frames');
      if (frames) args.push('--frames', frames);
      const showFps = (params.get('showFps') || '').toLowerCase();
      if (showFps === '1' || showFps === 'true' || showFps === 'yes') args.push('--show-fps');
      const fpsCap = Number.parseInt(params.get('fpsCap') || '0', 10) || 0;
      if (fpsCap > 0) args.push('--fps-cap', String(Math.min(1000, fpsCap)));
      const rmluiDocument = params.get('rmlui-document') || params.get('rmluiDocument');
      if (rmluiDocument) args.push('--rmlui-document', rmluiDocument);
      const compiledProject = params.get('compiled-project') || params.get('compiledProject');
      if (compiledProject) args.push('--compiled-project', compiledProject);
      const skipTitleScreen = (params.get('skipTitleScreen') || '').toLowerCase();
      if (skipTitleScreen === '1' || skipTitleScreen === 'true' || skipTitleScreen === 'yes') {
        args.push('--skip-title-screen');
      }
      const noImgui = (params.get('noImgui') || '').toLowerCase();
      if (noImgui === '1' || noImgui === 'true' || noImgui === 'yes') args.push('--no-imgui');
      const renderPerf = (params.get('renderPerf') || '').toLowerCase();
      if (renderPerf === '1' || renderPerf === 'true' || renderPerf === 'yes') args.push('--render-perf');
      const compat = (params.get('compat') || '').toLowerCase();
      if (compat === '1' || compat === 'true' || compat === 'yes') {
        args.push('--rmlui-base-direct-compat');
      }
      return args;
    })(),
    onRuntimeInitialized: function() {
      if (typeof globalThis.NovelTeaPreviewRuntimeReady === 'function') {
        globalThis.NovelTeaPreviewRuntimeReady();
      }
    },
    print: function(text) {
      console.log(text);
      if (text.indexOf('[engine] ready') !== -1) hideStatus();
    },
    printErr: function(text) {
      console.error(text);
    }
  };
</script>
{{{ SCRIPT }}}
</body>
</html>
