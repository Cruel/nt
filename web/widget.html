<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovelTea Editor Preview Widget</title>
<style>
  html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #111318; color: #cbd5e1; font-family: sans-serif; }
  canvas { display: block; width: 100vw; height: 100vh; background: #111318; }
  #status { display: none; position: fixed; left: 10px; top: 10px; right: 10px; z-index: 10; padding: 8px 10px; border-radius: 4px; background: rgba(127, 29, 29, 240); color: #fee2e2; font: 11px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; pointer-events: none; white-space: pre-wrap; }
  #fps-counter { display: none; position: fixed; left: 10px; bottom: 10px; z-index: 9; padding: 4px 6px; border-radius: 4px; background: rgba(15, 23, 42, 0.84); color: #cbd5e1; font: 11px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; pointer-events: none; }
</style>
</head>
<body>
<canvas id="canvas" tabindex="-1"></canvas>
<div id="status"></div>
<div id="fps-counter"></div>
<script>
  (function() {
    const protocolVersion = 1;
    const params = new URLSearchParams(window.location.search);
    const commandQueue = [];
    const sessionToken = params.get('sessionToken') || '';
    let port = null;
    let engineReady = false;
    let runtimeReady = false;
    let pendingResize = null;
    let appliedResizeKey = '';
    let resizeScheduled = false;
    let previewMode = 'runtime';
    let currentPosition = { x: 0.5, y: 0.5 };
    let currentRunning = true;
    let drainingCommands = false;
    let previewActivityActive = true;
    let previewActivityVisible = true;
    let previewWheelPolicy = params.get('wheelPolicy') === 'editor-scroll' ? 'editor-scroll' : 'preview-input';
    let previewWheelRouteId = '';
    const editorRuntimeProjectPath = '/assets/project/editor-runtime-project.json';
    const editorRuntimeProjectLogicalPath = 'project:/editor-runtime-project.json';
    let showFpsCounter = params.get('showFps') === '1' || params.get('showFps') === 'true';
    let fpsCap = Math.max(0, Math.min(1000, Number.parseInt(params.get('fpsCap') || '0', 10) || 0));

    const rmlUiBaseStyle = `body, div,
h1, h2, h3, h4,
h5, h6, p,
hr, pre,
tabset tabs {
  display: block;
}

body {
  width: 100%;
  height: 100%;
  color: #f8fafc;
  font-family: Liberation Sans;
}

h1 {
  font-size: 2em;
  margin: .67em 0;
}

h2 {
  font-size: 1.5em;
  margin: .75em 0;
}

h3 {
  font-size: 1.17em;
  margin: .83em 0;
}

h4, p {
  margin: 1.12em 0;
}

h5 {
  font-size: .83em;
  margin: 1.5em 0;
}

h6 {
  font-size: .75em;
  margin: 1.67em 0;
}

h1, h2, h3, h4,
h5, h6, strong {
  font-weight: bold;
}

em {
  font-style: italic;
}

pre {
  white-space: pre;
}

hr {
  border-width: 1px;
}

button {
  display: inline-block;
  margin: 4px 0;
  padding: 8px 12px;
  min-width: 96px;
  color: #f8fafc;
  background-color: #334155;
  border-width: 1px;
  border-color: #64748b;
  border-radius: 4px;
  font-family: Liberation Sans;
  font-size: 14px;
  text-align: center;
}

button:hover {
  background-color: #475569;
  border-color: #94a3b8;
}

button:active {
  background-color: #1e293b;
}

table {
  box-sizing: border-box;
  display: table;
}

tr {
  box-sizing: border-box;
  display: table-row;
}

td {
  box-sizing: border-box;
  display: table-cell;
}

col {
  box-sizing: border-box;
  display: table-column;
}

colgroup {
  display: table-column-group;
}

thead, tbody, tfoot {
  display: table-row-group;
}`;

    function showFailure(text) {
      const status = document.getElementById('status');
      if (!status) return;
      status.textContent = text;
      status.style.display = 'block';
    }

    function hideFailure() {
      const status = document.getElementById('status');
      if (status) status.style.display = 'none';
    }

    function send(message) {
      if (message && message.type === 'fps-counter' && (!previewActivityActive || !previewActivityVisible)) return;
      if (port) port.postMessage(message);
    }

    function failCommand(message, reason, diagnostic = {}) {
      showFailure(reason);
      send({ version: protocolVersion, type: 'preview-diagnostic', diagnostic: { severity: 'warning', message: reason, ...diagnostic } });
      send({ version: protocolVersion, type: 'command-result', requestId: message.requestId, ok: false, error: reason });
    }

    function emitDiagnostic(message, diagnostic) {
      send({ version: protocolVersion, type: 'preview-diagnostic', diagnostic });
      if (message && message.requestId && diagnostic && diagnostic.severity === 'error') showFailure(diagnostic.message);
    }

    function setFpsCounterText(fps, frameTimeMs, cap) {
      const counter = document.getElementById('fps-counter');
      if (!counter) return;
      if (!previewActivityActive || !previewActivityVisible || !showFpsCounter || !Number.isFinite(fps) || fps <= 0) {
        counter.style.display = 'none';
        counter.textContent = '';
        return;
      }
      const capText = cap > 0 ? ` engine cap ${cap}, display paced` : ' display paced';
      counter.textContent = `${fps.toFixed(1)} fps · ${frameTimeMs.toFixed(2)} ms ·${capText}`;
      counter.style.display = 'block';
    }

    function effectivePreviewFpsCap() {
      return previewActivityActive && previewActivityVisible ? fpsCap : 1;
    }

    function applyPreviewFramePacing() {
      if (typeof Module !== 'undefined' && typeof Module._noveltea_engine_set_fps_cap === 'function') {
        Module._noveltea_engine_set_fps_cap(effectivePreviewFpsCap());
      }
    }

    function applyEngineSettings(settings = {}) {
      if (typeof settings.showFpsCounter === 'boolean') {
        showFpsCounter = settings.showFpsCounter;
      }
      if (typeof settings.fpsCap === 'number' && Number.isFinite(settings.fpsCap)) {
        fpsCap = Math.max(0, Math.min(1000, Math.trunc(settings.fpsCap)));
      }
      if (!showFpsCounter) setFpsCounterText(0, 0, fpsCap);
      if (typeof Module !== 'undefined') {
        if (typeof Module._noveltea_engine_set_show_fps_counter === 'function') {
          Module._noveltea_engine_set_show_fps_counter(showFpsCounter ? 1 : 0);
        }
        applyPreviewFramePacing();
      }
    }

    function applyPreviewActivity(message) {
      if (!message || message.version !== protocolVersion || message.type !== 'set-preview-activity' || typeof message.requestId !== 'string') {
        return false;
      }
      if (typeof message.active !== 'boolean' || (message.visible !== undefined && typeof message.visible !== 'boolean')) {
        failCommand(message, 'Invalid preview activity command.', { category: 'preview-activity' });
        return true;
      }
      const wasVisible = previewActivityVisible;
      previewActivityActive = message.active;
      previewActivityVisible = message.visible === undefined ? message.active : message.visible;
      applyPreviewFramePacing();
      if (!previewActivityActive || !previewActivityVisible) {
        setFpsCounterText(0, 0, fpsCap);
      } else if (!wasVisible && previewActivityVisible) {
        // This is intentionally presentation-only. The runtime state is not stopped, reset, or reloaded.
        resizeCanvas();
        scheduleResizeApply();
      }
      send({ version: protocolVersion, type: 'command-result', requestId: message.requestId, ok: true });
      return true;
    }

    function applyPreviewWheelRouting(message) {
      if (!message || message.version !== protocolVersion || message.type !== 'set-preview-wheel-routing' || typeof message.requestId !== 'string') {
        return false;
      }
      if ((message.policy !== 'editor-scroll' && message.policy !== 'preview-input') ||
          typeof message.routeId !== 'string' || message.routeId.length === 0) {
        failCommand(message, 'Invalid preview wheel routing command.', { category: 'preview-wheel' });
        return true;
      }
      previewWheelPolicy = message.policy;
      previewWheelRouteId = message.routeId;
      send({ version: protocolVersion, type: 'command-result', requestId: message.requestId, ok: true });
      return true;
    }

    window.addEventListener('wheel', (event) => {
      if (previewWheelPolicy !== 'editor-scroll') return;
      if (event.ctrlKey || event.metaKey) return;
      event.preventDefault();
      event.stopImmediatePropagation();
      if (!port || !previewWheelRouteId) return;
      send({
        version: protocolVersion,
        type: 'preview-wheel',
        routeId: previewWheelRouteId,
        deltaX: event.deltaX,
        deltaY: event.deltaY,
        deltaMode: event.deltaMode,
        shiftKey: event.shiftKey,
        ctrlKey: event.ctrlKey,
        altKey: event.altKey,
        metaKey: event.metaKey,
      });
    }, { capture: true, passive: false });

    function sourceText(source) {
      return source && source.sourceMode === 'inline' && typeof source.sourceText === 'string' ? source.sourceText : '';
    }

    function injectHeadContent(rml, content) {
      if (!content) return rml;
      if (/<\/head\s*>/i.test(rml)) return rml.replace(/<\/head\s*>/i, `${content}\n</head>`);
      if (/<\s*rml[\s>]/i.test(rml)) return rml.replace(/<\s*rml([^>]*)>/i, `<rml$1>\n<head>\n${content}\n</head>`);
      return `<rml>\n<head>\n${content}\n</head>\n<body>\n${rml}\n</body>\n</rml>`;
    }

    function buildLayoutPreviewRml(data) {
      const rmlSource = sourceText(data && data.rml);
      const rcssSource = sourceText(data && data.rcss);
      const layoutKind = data && data.layoutKind === 'fragment' ? 'fragment' : 'document';
      const style = `<style>\n${rmlUiBaseStyle}\n${rcssSource}\n</style>`;
      if (layoutKind === 'fragment') {
        return `<rml>\n<head>\n<title>Layout Preview</title>\n${style}\n</head>\n<body>\n<div id="nt-layout-preview-root">\n<div id="nt-layout-preview-mount">\n${rmlSource}\n</div>\n</div>\n</body>\n</rml>`;
      }
      const documentSource = rmlSource.trim().length > 0 ? rmlSource : '<rml><head><title>Empty Layout Preview</title></head><body></body></rml>';
      return injectHeadContent(documentSource, style);
    }

    function escapeText(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function escapeRcssString(value) {
      return String(value == null ? '' : value).replace(/\\/g, '\\\\').replace(/"/g, '\\"');
    }

    function projectImageSource(asset) {
      return asset && typeof asset.path === 'string' && asset.path.length > 0 ? `project:/${asset.path}` : '';
    }

    function buildShaderPreviewRml(data) {
      const materialId = data && typeof data.previewMaterialId === 'string' ? data.previewMaterialId : 'ui/noise_panel';
      const escapedMaterialId = escapeRcssString(materialId);
      return `<rml>\n<head>\n<title>Shader Preview</title>\n<style>\nbody { margin: 0; width: 100%; height: 100%; background-color: #0f172a; font-family: Liberation Sans; }\n#nt-shader-preview-stage { position: absolute; left: 0; top: 0; right: 0; bottom: 0; background-color: #0f172a; }\n#nt-shader-preview-square { position: absolute; left: 50%; top: 50%; width: 256px; height: 256px; margin-left: -128px; margin-top: -128px; background-color: #1e293b; border: 1px #94a3b8; decorator: shader("${escapedMaterialId}"); }\n</style>\n</head>\n<body>\n<div id="nt-shader-preview-stage"><div id="nt-shader-preview-square"></div></div>\n</body>\n</rml>`;
    }

    function buildMaterialPreviewRml(data) {
      const materialId = data && typeof data.materialId === 'string' ? data.materialId : 'ui/noise_panel';
      const escapedMaterialId = escapeRcssString(materialId);
      return `<rml>\n<head>\n<title>Material Preview</title>\n<style>\nbody { margin: 0; width: 100%; height: 100%; background-color: #111827; font-family: Liberation Sans; }\n#nt-material-preview-stage { position: absolute; left: 0; top: 0; right: 0; bottom: 0; background-color: #111827; }\n#nt-material-preview-card { position: absolute; left: 50%; top: 50%; width: 256px; height: 256px; margin-left: -128px; margin-top: -128px; background-color: #1f2937; border: 1px #94a3b8; decorator: shader("${escapedMaterialId}"); }\n#nt-material-preview-label { position: absolute; left: 16px; top: 16px; color: #cbd5e1; font-size: 14px; }\n</style>\n</head>\n<body>\n<div id="nt-material-preview-stage"><div id="nt-material-preview-label">${escapeText(materialId)}</div><div id="nt-material-preview-card"></div></div>\n</body>\n</rml>`;
    }

    function buildCharacterPreviewRml(data) {
      const name = data && (data.displayName || data.label || data.characterId) ? data.displayName || data.label || data.characterId : 'Character';
      const pose = data && data.pose ? data.pose : null;
      const expression = data && data.expression ? data.expression : null;
      const spriteSource = projectImageSource(data && data.resolvedSprite);
      const material = data && data.resolvedMaterial && data.resolvedMaterial.id ? data.resolvedMaterial.id : '';
      const imageMarkup = spriteSource
        ? `<img id="nt-character-preview-sprite" src="${escapeText(spriteSource)}" />`
        : '<div id="nt-character-preview-placeholder">No sprite selected</div>';
      const materialStyle = material ? ` decorator: shader("${escapeRcssString(material)}");` : '';
      return `<rml>\n<head>\n<title>Character Preview</title>\n<style>\nbody { margin: 0; width: 100%; height: 100%; background-color: #0f172a; font-family: Liberation Sans; color: #e5e7eb; }\n#nt-character-preview-stage { position: absolute; left: 0; top: 0; right: 0; bottom: 0; background-color: #0f172a; }\n#nt-character-preview-card { position: absolute; left: 50%; top: 50%; width: 320px; height: 420px; margin-left: -160px; margin-top: -210px; background-color: #111827; border: 1px #334155;${materialStyle} }\n#nt-character-preview-sprite { position: absolute; left: 24px; top: 48px; width: 272px; height: 272px; }\n#nt-character-preview-placeholder { position: absolute; left: 24px; top: 48px; width: 272px; height: 272px; border: 1px #475569; color: #94a3b8; text-align: center; padding-top: 122px; }\n#nt-character-preview-name { position: absolute; left: 24px; top: 336px; right: 24px; color: #f8fafc; font-size: 22px; }\n#nt-character-preview-meta { position: absolute; left: 24px; top: 368px; right: 24px; color: #94a3b8; font-size: 13px; }\n</style>\n</head>\n<body>\n<div id="nt-character-preview-stage"><div id="nt-character-preview-card">${imageMarkup}<div id="nt-character-preview-name">${escapeText(name)}</div><div id="nt-character-preview-meta">Pose: ${escapeText(pose && pose.label || pose && pose.id || 'none')} | Expression: ${escapeText(expression && expression.label || expression && expression.id || 'none')}</div></div></div>\n</body>\n</rml>`;
    }


    function buildRoomPreviewRml(data) {
      const name = data && (data.displayName || data.label || data.roomId) ? data.displayName || data.label || data.roomId : 'Room';
      const background = data && data.background ? data.background : {};
      const backgroundAsset = data && data.backgroundAsset ? data.backgroundAsset : null;
      const backgroundSource = projectImageSource(backgroundAsset);
      const backgroundColor = background && typeof background.color === 'string' && background.color.length > 0 ? background.color : '#111827';
      const material = data && data.backgroundMaterial && data.backgroundMaterial.id ? data.backgroundMaterial.id : '';
      const materialStyle = material ? ` decorator: shader("${escapeRcssString(material)}");` : '';
      const description = data && data.description && typeof data.description.source === 'string' ? data.description.source : '';
      const paths = data && Array.isArray(data.paths) ? data.paths : [];
      const hotspots = data && Array.isArray(data.hotspots) ? data.hotspots : [];
      const showHotspots = !data || !data.preview || data.preview.showHotspots !== false;
      const backgroundMarkup = backgroundSource
        ? `<img id="nt-room-preview-background-image" src="${escapeText(backgroundSource)}" />`
        : '<div id="nt-room-preview-background-placeholder">No background image selected</div>';
      const pathMarkup = paths.filter((path) => path && path.enabled !== false).map((path) => {
        const target = path.targetLabel || (path.target && path.target.$ref && path.target.$ref.id) || 'no target';
        return `<button class="nt-room-preview-path">${escapeText(path.label || path.direction || path.id)} → ${escapeText(target)}</button>`;
      }).join('');
      const hotspotMarkup = showHotspots ? hotspots.map((hotspot) => {
        if (!hotspot || !hotspot.bounds) return '';
        const b = hotspot.bounds;
        const left = Math.max(0, Math.min(100, Number(b.x || 0) * 100));
        const top = Math.max(0, Math.min(100, Number(b.y || 0) * 100));
        const width = Math.max(1, Math.min(100, Number(b.width || 0) * 100));
        const height = Math.max(1, Math.min(100, Number(b.height || 0) * 100));
        const objectLabel = hotspot.objectMetadata && hotspot.objectMetadata.label ? hotspot.objectMetadata.label : hotspot.label || hotspot.id;
        return `<button class="nt-room-preview-hotspot" style="left: ${left}%; top: ${top}%; width: ${width}%; height: ${height}%;" nt-object="${escapeText(hotspot.object && hotspot.object.$ref ? hotspot.object.$ref.id : hotspot.id)}"><span>${escapeText(objectLabel)}</span></button>`;
      }).join('') : '';
      return `<rml>\n<head>\n<title>Room Preview</title>\n<style>\nbody { margin: 0; width: 100%; height: 100%; background-color: ${escapeRcssString(backgroundColor)}; font-family: Liberation Sans; color: #e5e7eb; }\n#nt-room-preview-stage { position: absolute; left: 0; top: 0; right: 0; bottom: 0; overflow: hidden; background-color: ${escapeRcssString(backgroundColor)};${materialStyle} }\n#nt-room-preview-background-image { position: absolute; left: 0; top: 0; width: 100%; height: 100%; }\n#nt-room-preview-background-placeholder { position: absolute; left: 24px; top: 24px; right: 24px; bottom: 148px; border: 1px #475569; color: #94a3b8; text-align: center; padding-top: 120px; }\n#nt-room-preview-title { position: absolute; left: 24px; top: 18px; padding: 8px 12px; background-color: rgba(15, 23, 42, 180); color: #f8fafc; font-size: 22px; }\n#nt-room-preview-description { position: absolute; left: 24px; right: 24px; bottom: 64px; min-height: 48px; padding: 10px 12px; background-color: rgba(15, 23, 42, 210); color: #e5e7eb; font-size: 14px; }\n#nt-room-preview-paths { position: absolute; left: 24px; right: 24px; bottom: 16px; height: 36px; }\n.nt-room-preview-path { margin-right: 8px; min-width: 80px; }\n.nt-room-preview-hotspot { position: absolute; border: 1px #f59e0b; background-color: rgba(245, 158, 11, 45); color: #fffbeb; font-size: 12px; text-align: left; }\n.nt-room-preview-hotspot span { display: block; padding: 3px 5px; background-color: rgba(15, 23, 42, 180); }\n</style>\n</head>\n<body>\n<div id="nt-room-preview-stage">${backgroundMarkup}${hotspotMarkup}<div id="nt-room-preview-title">${escapeText(name)}</div><div id="nt-room-preview-description">${escapeText(description || 'No room description yet.')}</div><div id="nt-room-preview-paths">${pathMarkup}</div></div>\n</body>\n</rml>`;
    }

    function buildDialoguePreviewRml(data) {
      const name = data && (data.displayName || data.label || data.dialogueId) ? data.displayName || data.label || data.dialogueId : 'Dialogue';
      const block = data && data.selectedBlock ? data.selectedBlock : null;
      const blockLabel = block && (block.label || block.id) ? block.label || block.id : 'No block selected';
      const blockType = block && block.type ? block.type : 'missing';
      const segments = block && Array.isArray(block.segments) ? block.segments : [];
      const choices = data && Array.isArray(data.choices) ? data.choices : [];
      const background = data && data.preview && data.preview.background === 'light' ? '#f8fafc' : '#0f172a';
      const foreground = data && data.preview && data.preview.background === 'light' ? '#0f172a' : '#e5e7eb';
      const segmentMarkup = segments.length > 0 ? segments.map((segment) => {
        if (!segment) return '';
        const speaker = segment.speakerMetadata && segment.speakerMetadata.displayName ? segment.speakerMetadata.displayName : '';
        const text = segment.text && typeof segment.text.source === 'string' && segment.text.source.trim().length > 0 ? segment.text.source : '[empty line]';
        const flags = [];
        if (segment.condition && segment.condition.enabled) flags.push('condition');
        if (segment.script && segment.script.enabled) flags.push('script');
        if (segment.flags && segment.flags.showOnce) flags.push('once');
        const meta = flags.length > 0 ? `<span class="nt-dialogue-preview-flags">${escapeText(flags.join(' · '))}</span>` : '';
        return `<div class="nt-dialogue-preview-segment"><div class="nt-dialogue-preview-speaker">${escapeText(speaker)}</div><div class="nt-dialogue-preview-line">${escapeText(text)}</div>${meta}</div>`;
      }).join('') : '<div class="nt-dialogue-preview-empty">No dialogue segments in this block.</div>';
      const choiceMarkup = choices.length > 0 ? choices.map((choice) => {
        const target = choice.targetLabel || choice.toBlockId || 'missing target';
        const label = choice.label || choice.kind || choice.id;
        const flags = choice.condition && choice.condition.enabled ? ' condition' : '';
        return `<button class="nt-dialogue-preview-choice">${escapeText(label)} → ${escapeText(target)}${escapeText(flags)}</button>`;
      }).join('') : '<div class="nt-dialogue-preview-no-choices">No outgoing choices.</div>';
      return `<rml>\n<head>\n<title>Dialogue Preview</title>\n<style>\nbody { margin: 0; width: 100%; height: 100%; background-color: ${background}; font-family: Liberation Sans; color: ${foreground}; }\n#nt-dialogue-preview-stage { position: absolute; left: 0; top: 0; right: 0; bottom: 0; padding: 24px; background-color: ${background}; }\n#nt-dialogue-preview-card { position: absolute; left: 24px; right: 24px; top: 24px; bottom: 24px; background-color: rgba(15, 23, 42, 220); border: 1px #334155; padding: 18px; }\n#nt-dialogue-preview-title { color: #f8fafc; font-size: 22px; margin-bottom: 4px; }\n#nt-dialogue-preview-meta { color: #94a3b8; font-size: 12px; margin-bottom: 16px; }\n.nt-dialogue-preview-segment { margin-bottom: 10px; padding: 10px; background-color: rgba(30, 41, 59, 210); }\n.nt-dialogue-preview-speaker { color: #93c5fd; font-size: 12px; margin-bottom: 4px; }\n.nt-dialogue-preview-line { color: #e5e7eb; font-size: 15px; }\n.nt-dialogue-preview-flags { display: block; margin-top: 4px; color: #fbbf24; font-size: 11px; }\n#nt-dialogue-preview-choices { position: absolute; left: 18px; right: 18px; bottom: 18px; }\n.nt-dialogue-preview-choice { display: block; width: 100%; margin-top: 6px; text-align: left; }\n.nt-dialogue-preview-empty, .nt-dialogue-preview-no-choices { color: #94a3b8; font-size: 13px; }\n</style>\n</head>\n<body>\n<div id="nt-dialogue-preview-stage"><div id="nt-dialogue-preview-card"><div id="nt-dialogue-preview-title">${escapeText(name)}</div><div id="nt-dialogue-preview-meta">${escapeText(blockLabel)} · ${escapeText(blockType)}</div>${segmentMarkup}<div id="nt-dialogue-preview-choices">${choiceMarkup}</div></div></div>\n</body>\n</rml>`;
    }

    function buildScenePreviewRml(data) {
      const name = data && (data.displayName || data.label || data.sceneId) ? data.displayName || data.label || data.sceneId : 'Scene';
      const selected = data && data.selectedStep ? data.selectedStep : null;
      const selectedLabel = selected && (selected.label || selected.id) ? selected.label || selected.id : 'No step selected';
      const selectedType = selected && selected.type ? selected.type : 'missing';
      const state = data && data.state ? data.state : {};
      const background = data && data.preview && data.preview.background === 'light' ? '#f8fafc' : '#0f172a';
      const foreground = data && data.preview && data.preview.background === 'light' ? '#0f172a' : '#e5e7eb';
      const steps = data && Array.isArray(data.steps) ? data.steps : [];
      const stepMarkup = steps.slice(0, 12).map((step) => {
        const marker = step.selected ? '▶ ' : '';
        const flags = [];
        if (step.indicators && step.indicators.condition) flags.push('condition');
        if (step.indicators && step.indicators.script) flags.push('script');
        if (step.indicators && step.indicators.autosaveBefore) flags.push('autosave-before');
        if (step.indicators && step.indicators.autosaveAfter) flags.push('autosave-after');
        const meta = flags.length > 0 ? ` · ${flags.join(', ')}` : '';
        return `<div class="nt-scene-preview-step${step.selected ? ' selected' : ''}">${escapeText(marker + (step.label || step.id || 'step'))}<span>${escapeText((step.type || 'unknown') + meta)}</span></div>`;
      }).join('');
      const characters = state && Array.isArray(state.characters) ? state.characters : [];
      const characterMarkup = characters.length > 0 ? characters.map((character) => {
        const meta = [character.action, character.position, character.pose, character.expression].filter(Boolean).join(' · ');
        const name = character.characterMetadata && character.characterMetadata.displayName ? character.characterMetadata.displayName : character.character && character.character.$ref ? character.character.$ref.id : 'Character';
        return `<div class="nt-scene-preview-chip">${escapeText(name)}<span>${escapeText(meta)}</span></div>`;
      }).join('') : '<div class="nt-scene-preview-muted">No visible characters.</div>';
      const backgroundSummary = state && state.background ? state.background : null;
      const backgroundLabel = backgroundSummary && backgroundSummary.assetMetadata && backgroundSummary.assetMetadata.label ? backgroundSummary.assetMetadata.label : backgroundSummary && backgroundSummary.color ? backgroundSummary.color : 'Default background';
      const dialogue = state && state.dialogue && state.dialogue.dialogueMetadata ? state.dialogue.dialogueMetadata : null;
      const dialogueMarkup = dialogue ? `<div class="nt-scene-preview-chip">${escapeText(dialogue.displayName || dialogue.label || dialogue.id)}<span>${escapeText(dialogue.blockLabel || dialogue.blockId || 'entry')}</span></div>` : '<div class="nt-scene-preview-muted">No dialogue at selected state.</div>';
      return `<rml>\n<head>\n<title>Scene Preview</title>\n<style>\nbody { margin: 0; width: 100%; height: 100%; background-color: ${background}; font-family: Liberation Sans; color: ${foreground}; }\n#nt-scene-preview-stage { position: absolute; left: 0; top: 0; right: 0; bottom: 0; padding: 20px; background-color: ${background}; }\n#nt-scene-preview-card { position: absolute; left: 20px; right: 20px; top: 20px; bottom: 20px; background-color: rgba(15, 23, 42, 220); border: 1px #334155; padding: 16px; }\n#nt-scene-preview-title { color: #f8fafc; font-size: 22px; margin-bottom: 4px; }\n#nt-scene-preview-meta { color: #94a3b8; font-size: 12px; margin-bottom: 12px; }\n#nt-scene-preview-state { position: absolute; left: 16px; top: 76px; width: 47%; bottom: 16px; }\n#nt-scene-preview-steps { position: absolute; right: 16px; top: 76px; width: 47%; bottom: 16px; }\n.nt-scene-preview-section-title { color: #93c5fd; font-size: 13px; margin: 10px 0 6px; }\n.nt-scene-preview-chip, .nt-scene-preview-step { margin-bottom: 6px; padding: 7px 8px; background-color: rgba(30, 41, 59, 210); color: #e5e7eb; font-size: 13px; }\n.nt-scene-preview-step.selected { border: 1px #60a5fa; }\n.nt-scene-preview-chip span, .nt-scene-preview-step span { display: block; margin-top: 2px; color: #94a3b8; font-size: 11px; }\n.nt-scene-preview-muted { color: #94a3b8; font-size: 12px; margin-bottom: 6px; }\n</style>\n</head>\n<body>\n<div id="nt-scene-preview-stage"><div id="nt-scene-preview-card"><div id="nt-scene-preview-title">${escapeText(name)}</div><div id="nt-scene-preview-meta">${escapeText(selectedLabel)} · ${escapeText(selectedType)}</div><div id="nt-scene-preview-state"><div class="nt-scene-preview-section-title">Background</div><div class="nt-scene-preview-chip">${escapeText(backgroundLabel)}<span>${escapeText(backgroundSummary && backgroundSummary.fit ? backgroundSummary.fit : '')}</span></div><div class="nt-scene-preview-section-title">Characters</div>${characterMarkup}<div class="nt-scene-preview-section-title">Dialogue</div>${dialogueMarkup}</div><div id="nt-scene-preview-steps"><div class="nt-scene-preview-section-title">Steps</div>${stepMarkup || '<div class="nt-scene-preview-muted">No scene steps.</div>'}</div></div></div>\n</body>\n</rml>`;
    }

    function emitDocumentDiagnostics(document) {
      const data = document && document.data ? document.data : null;
      if (!data || !Array.isArray(data.diagnostics)) return;
      data.diagnostics.forEach((diagnostic) => {
        if (!diagnostic || typeof diagnostic.message !== 'string') return;
        send({ version: protocolVersion, type: 'preview-diagnostic', diagnostic: { severity: diagnostic.severity || 'warning', message: diagnostic.message, path: diagnostic.path } });
      });
    }

    function executePreviewLua(message, source) {
      if (!source || source.trim().length === 0) return true;
      if (typeof Module._noveltea_preview_execute_lua_script !== 'function') {
        failCommand(message, 'Preview widget build does not export noveltea_preview_execute_lua_script. Rebuild the editor preview.');
        return false;
      }
      const ok = Module.ccall('noveltea_preview_execute_lua_script', 'number', ['string'], [source]);
      if (!ok) {
        failCommand(message, 'Lua preview script failed. Check the engine console for the Lua traceback.');
        return false;
      }
      return true;
    }

    function applyPreviewRml(message, rml, luaSource) {
      if (typeof Module._noveltea_preview_load_rml_document !== 'function') {
        failCommand(message, 'Preview widget build does not export noveltea_preview_load_rml_document. Rebuild the editor preview.');
        return;
      }
      if (!executePreviewLua(message, luaSource || '')) return;
      const ok = Module.ccall('noveltea_preview_load_rml_document', 'number', ['string'], [rml]);
      if (ok) {
        hideFailure();
        send({ version: protocolVersion, type: 'command-result', requestId: message.requestId, ok: true });
      } else {
        failCommand(message, 'RmlUi failed to load the preview document. Check RML/RCSS diagnostics and engine logs.');
      }
    }

    function unsupportedSourceMode(source) {
      return source && source.sourceMode && source.sourceMode !== 'inline' ? source.sourceMode : '';
    }

    async function fetchPreviewText(url) {
      if (typeof url !== 'string' || url.length === 0) return '';
      const response = await fetch(url, { cache: 'no-store' });
      if (!response.ok) throw new Error(`${url}: ${response.status} ${response.statusText}`);
      return response.text();
    }

    async function resolvePreviewTemplates(data) {
      const next = { ...(data || {}) };
      if (next.layoutKind === 'fragment' && next.internalTemplates) {
        next.templateTexts = {
          ...(next.templateTexts || {}),
          layoutFragmentHostRml: await fetchPreviewText(next.internalTemplates.hostRml),
          layoutFragmentHostRcss: await fetchPreviewText(next.internalTemplates.hostRcss),
        };
      }
      if (next.template) {
        next.templateTexts = {
          ...(next.templateTexts || {}),
          shaderSquareRml: await fetchPreviewText(next.template.rml),
          shaderSquareRcss: await fetchPreviewText(next.template.rcss),
        };
      }
      return next;
    }

    async function showEnginePreviewDocument(message, document) {
      if (typeof Module._noveltea_preview_show_editor_document !== 'function') {
        failCommand(message, 'Preview widget build does not export noveltea_preview_show_editor_document. Rebuild the editor preview.');
        return;
      }
      let data = document && document.data ? document.data : {};
      if (document.kind === 'layout-preview') {
        const unsupportedSources = [
          ['rml', data.rml],
          ['rcss', data.rcss],
          ['lua', data.lua],
        ].filter(([, source]) => unsupportedSourceMode(source));
        if (unsupportedSources.length > 0) {
          for (const [key, source] of unsupportedSources) {
            emitDiagnostic(message, {
              severity: 'error',
              category: 'layout-preview-source',
              path: `/${key}/sourceMode`,
              message: `Asset-mode ${key.toUpperCase()} preview source is not resolved yet (${unsupportedSourceMode(source)}).`,
              sourceUrl: source && source.sourceAsset && source.sourceAsset.path ? `project:/${source.sourceAsset.path}` : undefined,
            });
          }
          failCommand(message, 'Asset-mode layout preview sources are not resolved by the preview widget yet. Use inline RML/RCSS/Lua for live preview.', { category: 'layout-preview-source' });
          return;
        }
      }
      try {
        data = await resolvePreviewTemplates(data);
        if (!(await stagePreviewProjectAssets(message, data))) return;
      } catch (error) {
        failCommand(message, `Failed to load preview template: ${error && error.message ? error.message : String(error)}`, { category: 'preview-template' });
        return;
      }
      const ok = Module.ccall('noveltea_preview_show_editor_document', 'number', ['string', 'string'], [document.kind, JSON.stringify(data)]);
      if (ok) {
        hideFailure();
        send({ version: protocolVersion, type: 'command-result', requestId: message.requestId, ok: true });
      } else {
        failCommand(message, `${document.kind} failed in the engine preview bridge. Check Preview Diagnostics and engine logs.`);
      }
    }

    async function applyPreviewDocument(message) {
      const document = message.document;
      const kind = document && document.kind ? document.kind : 'unknown';
      const data = document && document.data ? document.data : {};
      emitDocumentDiagnostics(document);
      if (kind === 'layout-preview' || kind === 'shader-preview') await showEnginePreviewDocument(message, document);
      else {
        if (!(await stagePreviewProjectAssets(message, data))) return;
        if (kind === 'material-preview') applyPreviewRml(message, buildMaterialPreviewRml(data));
        else if (kind === 'character-preview') applyPreviewRml(message, buildCharacterPreviewRml(data));
        else if (kind === 'room-preview') applyPreviewRml(message, buildRoomPreviewRml(data));
        else if (kind === 'dialogue-preview') applyPreviewRml(message, buildDialoguePreviewRml(data));
        else if (kind === 'scene-preview') applyPreviewRml(message, buildScenePreviewRml(data));
        else failCommand(message, `Preview widget cannot render document '${kind}'.`);
      }
    }

    function nativeExportAvailable(exportName) {
      return typeof Module !== 'undefined' && typeof Module[`_${exportName}`] === 'function';
    }

    function moduleFileSystem() {
      if (typeof Module !== 'undefined' && Module.FS) return Module.FS;
      if (typeof FS !== 'undefined') return FS;
      return null;
    }

    function safeProjectAssetPath(value) {
      if (typeof value !== 'string' || value.length === 0) return false;
      if (value.startsWith('/') || value.startsWith('\\') || value.includes(':') || value.includes('\\') || value.includes('//')) return false;
      return value.split('/').every((part) => part.length > 0 && part !== '.' && part !== '..');
    }

    function projectAssetFetchUrl(projectRelativePath) {
      return `/project-assets/${projectRelativePath.split('/').map((part) => encodeURIComponent(part)).join('/')}`;
    }

    function ensureFsDirectory(fs, directory) {
      if (!directory || directory === '/') return;
      const parts = directory.split('/').filter(Boolean);
      let current = '';
      for (const part of parts) {
        current += `/${part}`;
        try {
          fs.mkdir(current);
        } catch {
          // Directory already exists, or another filesystem error will be reported by the later write.
        }
      }
    }

    function collectProjectAssetPaths(value, paths = new Set()) {
      if (!value || typeof value !== 'object') return paths;
      if (Array.isArray(value)) {
        for (const item of value) collectProjectAssetPaths(item, paths);
        return paths;
      }
      if (typeof value.path === 'string' && safeProjectAssetPath(value.path)) {
        paths.add(value.path);
      }
      for (const item of Object.values(value)) collectProjectAssetPaths(item, paths);
      return paths;
    }

    async function stageProjectAsset(message, fs, projectRelativePath, runtimePath = projectRelativePath) {
      const virtualPath = `/assets/project/${runtimePath}`;
      try {
        const response = await fetch(projectAssetFetchUrl(projectRelativePath), { cache: 'no-store' });
        if (!response.ok) {
          failCommand(message, `Project asset could not be loaded for preview: ${projectRelativePath}`, { category: 'project-asset', path: projectRelativePath });
          return false;
        }
        const bytes = new Uint8Array(await response.arrayBuffer());
        ensureFsDirectory(fs, virtualPath.slice(0, virtualPath.lastIndexOf('/')));
        fs.writeFile(virtualPath, bytes);
        return true;
      } catch (error) {
        failCommand(message, `Project asset could not be staged for preview: ${projectRelativePath}: ${error && error.message ? error.message : String(error)}`, { category: 'project-asset', path: projectRelativePath });
        return false;
      }
    }

    async function stagePreviewProjectAssets(message, data) {
      const paths = [...collectProjectAssetPaths(data)];
      if (paths.length === 0) return true;
      const fs = moduleFileSystem();
      if (!fs) {
        failCommand(message, 'Preview widget filesystem is unavailable. Rebuild the editor preview with FS exported.', { category: 'project-asset' });
        return false;
      }
      for (const projectRelativePath of paths) {
        const ok = await stageProjectAsset(message, fs, projectRelativePath);
        if (!ok) return false;
      }
      return true;
    }

    async function loadRuntimeProject(message) {
      if (!nativeExportAvailable('noveltea_runtime_load_project')) {
        failCommand(message, 'Preview widget build does not export noveltea_runtime_load_project. Rebuild the editor preview.', { category: 'preview-export' });
        return;
      }
      const fs = moduleFileSystem();
      if (!fs) {
        failCommand(message, 'Preview widget filesystem is unavailable. Rebuild the editor preview with FS exported.', { category: 'runtime-project' });
        return;
      }
      const assets = Array.isArray(message.assets) ? message.assets : [];
      for (const asset of assets) {
        if (!asset || !safeProjectAssetPath(asset.sourcePath) || !safeProjectAssetPath(asset.runtimePath)) {
          failCommand(message, 'Runtime preview asset mapping is invalid.', { category: 'runtime-project' });
          return;
        }
        if (!(await stageProjectAsset(message, fs, asset.sourcePath, asset.runtimePath))) return;
      }
      try {
        fs.mkdirTree('/assets/project');
        fs.writeFile(editorRuntimeProjectPath, JSON.stringify(message.project || {}, null, 2));
        if (message.shaderMaterialMetadata) {
          fs.writeFile('/assets/project/shader-materials.json', JSON.stringify(message.shaderMaterialMetadata));
        } else {
          try { fs.unlink('/assets/project/shader-materials.json'); } catch {}
        }
      } catch (error) {
        failCommand(message, `Could not write runtime project into preview filesystem: ${error && error.message ? error.message : String(error)}`, { category: 'runtime-project' });
        return;
      }
      const ok = Module.ccall('noveltea_runtime_load_project', 'number', ['string'], [editorRuntimeProjectLogicalPath]);
      if (!ok) {
        failCommand(message, 'Runtime project failed to load. Check export diagnostics and engine logs.', { category: 'runtime-project' });
        return;
      }
      hideFailure();
      emitRuntimeDebugSnapshot(message);
      send({ version: protocolVersion, type: 'command-result', requestId: message.requestId, ok: true });
    }

    function invokeNativeCommand(message, exportName, returnType, argTypes, args, failureMessage) {
      if (!nativeExportAvailable(exportName)) {
        failCommand(message, `Preview widget build does not export ${exportName}. Rebuild the editor preview.`, { category: 'preview-export' });
        return false;
      }
      const ok = Module.ccall(exportName, returnType, argTypes, args);
      if (returnType === null || returnType === 'void' || ok) {
        hideFailure();
        return true;
      } else {
        failCommand(message, failureMessage, { category: 'runtime-command' });
        return false;
      }
    }

    function completeNativeCommand(message, exportName, returnType, argTypes, args, failureMessage) {
      const ok = invokeNativeCommand(message, exportName, returnType, argTypes, args, failureMessage);
      if (ok) send({ version: protocolVersion, type: 'command-result', requestId: message.requestId, ok: true });
      return ok;
    }

    function completeDemoCommand(message, exportName, argTypes, args, failureMessage, nextState) {
      completeNativeCommand(message, exportName, null, argTypes, args, failureMessage);
      if (nextState) {
        if (nextState.position) currentPosition = nextState.position;
        if (typeof nextState.running === 'boolean') currentRunning = nextState.running;
      }
    }

    function readRuntimeDebugSnapshot(message, failOnError) {
      if (!nativeExportAvailable('noveltea_runtime_debug_snapshot')) {
        const reason = 'Preview widget build does not export noveltea_runtime_debug_snapshot. Rebuild the editor preview.';
        if (failOnError) failCommand(message, reason, { category: 'preview-export' });
        else emitDiagnostic(message, { severity: 'warning', category: 'preview-export', message: reason });
        return null;
      }
      const json = Module.ccall('noveltea_runtime_debug_snapshot', 'string', [], []);
      if (typeof json !== 'string' || json.length === 0) {
        const reason = 'Runtime debug snapshot is unavailable for the current preview session.';
        if (failOnError) failCommand(message, reason, { category: 'runtime-debug-snapshot' });
        else emitDiagnostic(message, { severity: 'warning', category: 'runtime-debug-snapshot', message: reason });
        return null;
      }
      try {
        const snapshot = JSON.parse(json);
        if (message && typeof message.requestId === 'string') snapshot.requestId = message.requestId;
        return snapshot;
      } catch (error) {
        const reason = `Runtime debug snapshot JSON could not be parsed: ${error && error.message ? error.message : String(error)}`;
        if (failOnError) failCommand(message, reason, { category: 'runtime-debug-snapshot' });
        else emitDiagnostic(message, { severity: 'warning', category: 'runtime-debug-snapshot', message: reason });
        return null;
      }
    }

    function emitRuntimeDebugSnapshot(message, options = {}) {
      const snapshot = readRuntimeDebugSnapshot(message, options.failOnError === true);
      if (!snapshot) return false;
      send({ version: protocolVersion, type: 'runtime-debug-snapshot', requestId: message.requestId, snapshot });
      return true;
    }

    function finishRuntimeFastForward(message) {
      if (!nativeExportAvailable('noveltea_runtime_fast_forward_to_input')) {
        failCommand(message, 'Preview widget build does not export noveltea_runtime_fast_forward_to_input. Rebuild the editor preview.', { category: 'preview-export' });
        return;
      }
      const resultJson = Module.ccall('noveltea_runtime_fast_forward_to_input', 'string', [], []);
      if (typeof resultJson !== 'string' || resultJson.length === 0) {
        failCommand(message, 'Runtime fast-forward-to-input did not return a result.', { category: 'runtime-fast-forward' });
        return;
      }
      let result;
      try {
        result = JSON.parse(resultJson);
      } catch (error) {
        failCommand(message, 'Runtime fast-forward result JSON could not be parsed: ' + (error && error.message ? error.message : String(error)), { category: 'runtime-fast-forward' });
        return;
      }
      send({ version: protocolVersion, type: 'runtime-fast-forward-result', requestId: message.requestId, result });
      if (result && result.finalSnapshot) {
        const snapshot = result.finalSnapshot;
        snapshot.requestId = message.requestId;
        send({ version: protocolVersion, type: 'runtime-debug-snapshot', requestId: message.requestId, snapshot });
      } else {
        emitRuntimeDebugSnapshot(message);
      }
    }

    function finishRuntimeDebugMutation(message, exportName, argTypes, args, failureMessage) {
      if (!nativeExportAvailable(exportName)) {
        failCommand(message, `Preview widget build does not export ${exportName}. Rebuild the editor preview.`, { category: 'preview-export' });
        return;
      }
      const eventJson = Module.ccall(exportName, 'string', argTypes, args);
      if (typeof eventJson !== 'string' || eventJson.length === 0) {
        failCommand(message, failureMessage, { category: 'runtime-debug-mutation' });
        return;
      }
      let event;
      try {
        event = JSON.parse(eventJson);
      } catch (error) {
        failCommand(message, `Runtime debug mutation event JSON could not be parsed: ${error && error.message ? error.message : String(error)}`, { category: 'runtime-debug-mutation' });
        return;
      }
      event.requestId = message.requestId;
      send({ version: protocolVersion, type: 'runtime-debug-event', requestId: message.requestId, event });
      emitRuntimeDebugSnapshot(message);
      send({ version: protocolVersion, type: 'command-result', requestId: message.requestId, ok: true });
    }

    function handleRuntimeCommand(message) {
      const finishRuntimeCommand = (exportName, returnType, argTypes, args, failureMessage) => {
        const ok = invokeNativeCommand(message, exportName, returnType, argTypes, args, failureMessage);
        if (!ok) return;
        emitRuntimeDebugSnapshot(message);
        send({ version: protocolVersion, type: 'command-result', requestId: message.requestId, ok: true });
      };
      switch (message.type) {
        case 'runtime-load-project':
          loadRuntimeProject(message);
          return true;
        case 'runtime-reset':
          finishRuntimeCommand('noveltea_runtime_reset', 'number', [], [], 'Runtime reset was not handled. No runtime project may be loaded.');
          return true;
        case 'runtime-start':
          finishRuntimeCommand('noveltea_runtime_start', 'number', [], [], 'Runtime start was not handled in the current runtime mode.');
          return true;
        case 'runtime-stop':
          finishRuntimeCommand('noveltea_runtime_stop', 'number', [], [], 'Runtime stop was not handled. No runtime project may be loaded.');
          return true;
        case 'runtime-step':
          finishRuntimeCommand('noveltea_runtime_step', 'number', ['number'], [Math.max(0, Number(message.deltaSeconds || 0))], 'Runtime step was not handled in the current runtime mode.');
          return true;
        case 'runtime-continue':
          finishRuntimeCommand('noveltea_runtime_continue', 'number', [], [], 'Runtime continue was not handled in the current runtime mode.');
          return true;
        case 'runtime-fast-forward-to-input':
          finishRuntimeFastForward(message);
          return true;
        case 'runtime-dialogue-option':
          finishRuntimeCommand('noveltea_runtime_dialogue_option', 'number', ['number'], [message.optionIndex], `Runtime dialogue option ${message.optionIndex} was not handled in the current runtime mode.`);
          return true;
        case 'runtime-navigate':
          finishRuntimeCommand('noveltea_runtime_navigate', 'number', ['number'], [message.direction], `Runtime navigation ${message.direction} was not handled in the current runtime mode.`);
          return true;
        case 'runtime-select-object':
          finishRuntimeCommand('noveltea_runtime_select_object', 'number', ['string'], [message.objectId], `Runtime object selection '${message.objectId}' was not handled in the current runtime mode.`);
          return true;
        case 'runtime-clear-object-selection':
          finishRuntimeCommand('noveltea_runtime_clear_object_selection', 'number', [], [], 'Runtime clear selection was not handled in the current runtime mode.');
          return true;
        case 'runtime-run-action':
          finishRuntimeCommand('noveltea_runtime_run_action', 'number', ['string', 'string'], [message.verbId, JSON.stringify(message.objectIds || [])], `Runtime action '${message.verbId}' was not handled in the current runtime mode.`);
          return true;
        case 'runtime-request-debug-snapshot':
          if (emitRuntimeDebugSnapshot(message, { failOnError: true })) {
            send({ version: protocolVersion, type: 'command-result', requestId: message.requestId, ok: true });
          }
          return true;
        case 'runtime-set-variable':
          finishRuntimeDebugMutation(message, 'noveltea_runtime_set_variable', ['string', 'string'], [message.variableId, JSON.stringify(message.value)], `Runtime variable '${message.variableId}' could not be set. The id may not exist in the loaded project.`);
          return true;
        case 'runtime-reset-variable':
          finishRuntimeDebugMutation(message, 'noveltea_runtime_reset_variable', ['string'], [message.variableId], `Runtime variable '${message.variableId}' could not be reset. The id may not exist in the loaded project.`);
          return true;
        case 'runtime-give-object':
          finishRuntimeDebugMutation(message, 'noveltea_runtime_give_object', ['string'], [message.objectId], `Runtime object '${message.objectId}' could not be given. The id may not exist in the loaded project.`);
          return true;
        case 'runtime-remove-inventory-object':
          finishRuntimeDebugMutation(message, 'noveltea_runtime_remove_inventory_object', ['string'], [message.objectId], `Runtime inventory object '${message.objectId}' could not be removed. The id may not exist in the loaded project.`);
          return true;
        case 'runtime-teleport-room':
          finishRuntimeDebugMutation(message, 'noveltea_runtime_teleport_room', ['string'], [message.roomId], `Runtime room '${message.roomId}' could not be teleported to. The id may not exist in the loaded project.`);
          return true;
        default:
          return false;
      }
    }

    async function runCommand(message) {
      try {
        if (applyPreviewActivity(message)) {
          return;
        }
        if (!runtimeReady || !engineReady) {
          commandQueue.push(message);
          return;
        }
        if (message.version !== protocolVersion || typeof message.requestId !== 'string') return;
        if (handleRuntimeCommand(message)) {
          return;
        }
        if (message.type === 'set-demo-position') {
          completeDemoCommand(message, 'noveltea_preview_set_demo_position', ['number', 'number'], [message.position.x, message.position.y], 'Demo position update failed.', { position: message.position });
        } else if (message.type === 'reset-demo') {
          completeDemoCommand(message, 'noveltea_preview_reset_demo', [], [], 'Demo reset failed.', { position: { x: 0.5, y: 0.5 } });
        } else if (message.type === 'play') {
          completeDemoCommand(message, 'noveltea_preview_set_running', ['number'], [1], 'Preview play failed.', { running: true });
        } else if (message.type === 'stop') {
          completeDemoCommand(message, 'noveltea_preview_set_running', ['number'], [0], 'Preview stop failed.', { running: false });
        } else if (message.type === 'request-state') {
          send({ version: protocolVersion, type: 'state', position: currentPosition, running: currentRunning });
          send({ version: protocolVersion, type: 'command-result', requestId: message.requestId, ok: true });
        } else if (message.type === 'set-preview-mode') {
          previewMode = message.mode || 'runtime';
          send({ version: protocolVersion, type: 'command-result', requestId: message.requestId, ok: true });
        } else if (message.type === 'load-preview-document' || message.type === 'update-preview-document') {

        } else if (message.type === 'request-preview-state') {
          send({ version: protocolVersion, type: 'preview-state', state: { mode: previewMode, ready: engineReady && runtimeReady } });
          send({ version: protocolVersion, type: 'command-result', requestId: message.requestId, ok: true });
        } else if (message.type === 'set-engine-settings') {
          applyEngineSettings(message.settings);
          send({ version: protocolVersion, type: 'command-result', requestId: message.requestId, ok: true });
        } else if (message.type === 'set-preview-display-profile') {
          const profile = message.profile;
          if (profile === null) {
            const ok = Module.ccall('noveltea_preview_set_display_profile', 'number', ['number', 'number', 'number', 'number', 'number'], [0, 0, 0, 0, 1]);
            if (!ok) failCommand(message, 'Preview display override could not be cleared.');
            else send({ version: protocolVersion, type: 'command-result', requestId: message.requestId, ok: true });
          } else {
            const width = Number(profile.aspectRatio && profile.aspectRatio.width);
            const height = Number(profile.aspectRatio && profile.aspectRatio.height);
            const color = typeof profile.barColor === 'string' && /^#[0-9a-fA-F]{6}$/.test(profile.barColor)
              ? ((Number.parseInt(profile.barColor.slice(1), 16) << 8) | 0xff) >>> 0
              : 0x000000ff;
            if (!Number.isInteger(width) || !Number.isInteger(height) || width <= 0 || height <= 0 || width > 10000 || height > 10000) {

          applyPreviewActivity(message);
        } else if (message.type === 'request-preview-snapshot') {
          failCommand(message, 'Preview snapshots are not implemented by the editor widget yet.');
        } else {
          failCommand(message, `Unsupported editor preview widget command '${message.type}'.`, { category: 'preview-command' });
        }
      } catch (error) {
        send({ version: protocolVersion, type: 'command-result', requestId: message.requestId || '', ok: false, error: String(error && error.message ? error.message : error) });
      }
    }

    async function drainCommands() {
      if (!runtimeReady || !engineReady) return;
      if (drainingCommands) return;
      drainingCommands = true;
      try {
        while (commandQueue.length > 0) await runCommand(commandQueue.shift());
      } finally {
        drainingCommands = false;
      }
    }

    function sendPreviewInteraction(interaction) {
      // Parent documents cannot observe iframe-to-iframe clicks, so report preview-local activity explicitly.
      if (!port) return;
      send({ version: protocolVersion, type: 'preview-interacted', interaction });

    window.addEventListener('pointerdown', () => sendPreviewInteraction('pointer'), { capture: true });
    window.addEventListener('focus', () => sendPreviewInteraction('focus'), { capture: true });

    function sendReadySnapshot() {
      if (!engineReady || !port) return;
      send({
        version: protocolVersion,
        type: 'ready',
        capabilities: ['layout-preview-v1', 'shader-preview-v1', 'material-preview-v1', 'character-preview-v1', 'room-preview-v1', 'dialogue-preview-v1', 'scene-preview-v1', 'engine-settings-v1', 'preview-activity-v1', 'preview-wheel-routing-v1', 'runtime-load-project-v1', 'runtime-commands-v1', 'runtime-debug-snapshot-v1', 'runtime-debug-mutations-v1', 'runtime-fast-forward-v1'],

    globalThis.NovelTeaPreviewBridge = {
      send,
      setPort(nextPort) {
        if (port) port.close();
        port = nextPort;
        port.onmessage = function(event) {

          void drainCommands();

        sendReadySnapshot();
        void drainCommands();
      },
      markEngineReady(position, running) {

        currentPosition = position;
        currentRunning = running;
        applyEngineSettings({ showFpsCounter, fpsCap });

        void drainCommands();
      },
      setFpsCounter(fps, frameTimeMs, cap) {

    window.addEventListener('message', (event) => {

      if (!data || data.type !== 'noveltea-preview-connect') return;

    function sendHello() {

    sendHello();
    const helloInterval = window.setInterval(() => {

    }, 250);

    function resizeCanvas() {
      const canvas = document.getElementById('canvas');
      const maxDpr = parseFloat(params.get('maxDpr') || '1') || 1;
      const dpr = Math.min(window.devicePixelRatio || 1, maxDpr);
      const rect = canvas.getBoundingClientRect();
      const logicalWidth = Math.max(1, Math.round(rect.width));
      const logicalHeight = Math.max(1, Math.round(rect.height));
      const framebufferWidth = Math.max(1, Math.round(logicalWidth * dpr));
      const framebufferHeight = Math.max(1, Math.round(logicalHeight * dpr));
      const scaleX = framebufferWidth / logicalWidth;
      const scaleY = framebufferHeight / logicalHeight;
      if (!runtimeReady) {
        canvas.width = framebufferWidth;
        canvas.height = framebufferHeight;
      }
      pendingResize = { logicalWidth, logicalHeight, framebufferWidth, framebufferHeight, scaleX, scaleY };
      scheduleResizeApply();
    }

    function scheduleResizeApply() {
      if (resizeScheduled) return;
      resizeScheduled = true;
      requestAnimationFrame(() => {
        resizeScheduled = false;
        applyPendingResize();
      });
    }

    function applyPendingResize() {
      if (!pendingResize || !runtimeReady || typeof Module._noveltea_preview_resize !== 'function') return;
      const resize = pendingResize;
      const key = `${resize.logicalWidth}x${resize.logicalHeight}:${resize.framebufferWidth}x${resize.framebufferHeight}:${resize.scaleX}x${resize.scaleY}`;
      if (key === appliedResizeKey) return;
      Module._noveltea_preview_resize(resize.logicalWidth, resize.logicalHeight, resize.framebufferWidth, resize.framebufferHeight, resize.scaleX, resize.scaleY);
      appliedResizeKey = key;
    }

    resizeCanvas();
    new ResizeObserver(resizeCanvas).observe(document.getElementById('canvas'));
    window.addEventListener('resize', resizeCanvas);
    requestAnimationFrame(resizeCanvas);

    globalThis.NovelTeaPreviewRuntimeReady = function() {
      runtimeReady = true;
      resizeCanvas();
      scheduleResizeApply();
      void drainCommands();
    };
  })();

  var Module = {
    canvas: document.getElementById('canvas'),
    arguments: (function() {
      const args = ['--preview-widget', '--demo', 'none', '--no-imgui'];
      const params = new URLSearchParams(window.location.search);
      const showFps = (params.get('showFps') || '').toLowerCase();
      const fpsCap = Number.parseInt(params.get('fpsCap') || '0', 10) || 0;
      if (showFps === '1' || showFps === 'true' || showFps === 'yes') args.push('--show-fps');
      if (fpsCap > 0) args.push('--fps-cap', String(Math.min(1000, fpsCap)));
      return args;
    })(),
    onRuntimeInitialized: function() {
      if (typeof globalThis.NovelTeaPreviewRuntimeReady === 'function') globalThis.NovelTeaPreviewRuntimeReady();
    },
    print: function(text) { console.log(text); },
    printErr: function(text) { console.error(text); }
  };
</script>
