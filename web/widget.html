<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovelTea Editor Preview Widget</title>
<style>
  html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #111318; color: #cbd5e1; font-family: sans-serif; }
  canvas { display: block; width: 100vw; height: 100vh; background: #111318; }
  #status { display: none; position: fixed; left: 10px; top: 10px; right: 10px; z-index: 10; padding: 8px 10px; border-radius: 4px; background: rgba(127, 29, 29, 240); color: #fee2e2; font: 11px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; pointer-events: none; white-space: pre-wrap; }
</style>
</head>
<body>
<canvas id="canvas" tabindex="-1"></canvas>
<div id="status"></div>
<script>
  (function() {
    const protocolVersion = 1;
    const params = new URLSearchParams(window.location.search);
    const commandQueue = [];
    const sessionToken = params.get('sessionToken') || '';
    let port = null;
    let engineReady = false;
    let runtimeReady = false;
    let pendingResize = null;
    let appliedResizeKey = '';
    let resizeScheduled = false;
    let previewMode = 'runtime';

    const rmlUiBaseStyle = `body, div,
h1, h2, h3, h4,
h5, h6, p,
hr, pre,
tabset tabs {
  display: block;
}

body {
  width: 100%;
  height: 100%;
  color: #f8fafc;
  font-family: Liberation Sans;
}

h1 {
  font-size: 2em;
  margin: .67em 0;
}

h2 {
  font-size: 1.5em;
  margin: .75em 0;
}

h3 {
  font-size: 1.17em;
  margin: .83em 0;
}

h4, p {
  margin: 1.12em 0;
}

h5 {
  font-size: .83em;
  margin: 1.5em 0;
}

h6 {
  font-size: .75em;
  margin: 1.67em 0;
}

h1, h2, h3, h4,
h5, h6, strong {
  font-weight: bold;
}

em {
  font-style: italic;
}

pre {
  white-space: pre;
}

hr {
  border-width: 1px;
}

button {
  display: inline-block;
  margin: 4px 0;
  padding: 8px 12px;
  min-width: 96px;
  color: #f8fafc;
  background-color: #334155;
  border-width: 1px;
  border-color: #64748b;
  border-radius: 4px;
  font-family: Liberation Sans;
  font-size: 14px;
  text-align: center;
}

button:hover {
  background-color: #475569;
  border-color: #94a3b8;
}

button:active {
  background-color: #1e293b;
}

table {
  box-sizing: border-box;
  display: table;
}

tr {
  box-sizing: border-box;
  display: table-row;
}

td {
  box-sizing: border-box;
  display: table-cell;
}

col {
  box-sizing: border-box;
  display: table-column;
}

colgroup {
  display: table-column-group;
}

thead, tbody, tfoot {
  display: table-row-group;
}`;

    function showFailure(text) {
      const status = document.getElementById('status');
      if (!status) return;
      status.textContent = text;
      status.style.display = 'block';
    }

    function hideFailure() {
      const status = document.getElementById('status');
      if (status) status.style.display = 'none';
    }

    function send(message) {
      if (port) port.postMessage(message);
    }

    function failCommand(message, reason) {
      showFailure(reason);
      send({ version: protocolVersion, type: 'preview-diagnostic', diagnostic: { severity: 'warning', message: reason } });
      send({ version: protocolVersion, type: 'command-result', requestId: message.requestId, ok: false, error: reason });
    }

    function sourceText(source) {
      return source && source.sourceMode === 'inline' && typeof source.sourceText === 'string' ? source.sourceText : '';
    }

    function injectHeadContent(rml, content) {
      if (!content) return rml;
      if (/<\/head\s*>/i.test(rml)) return rml.replace(/<\/head\s*>/i, `${content}\n</head>`);
      if (/<\s*rml[\s>]/i.test(rml)) return rml.replace(/<\s*rml([^>]*)>/i, `<rml$1>\n<head>\n${content}\n</head>`);
      return `<rml>\n<head>\n${content}\n</head>\n<body>\n${rml}\n</body>\n</rml>`;
    }

    function buildLayoutPreviewRml(data) {
      const rmlSource = sourceText(data && data.rml);
      const rcssSource = sourceText(data && data.rcss);
      const layoutKind = data && data.layoutKind === 'fragment' ? 'fragment' : 'document';
      const style = `<style>\n${rmlUiBaseStyle}\n${rcssSource}\n</style>`;
      if (layoutKind === 'fragment') {
        return `<rml>\n<head>\n<title>Layout Preview</title>\n${style}\n</head>\n<body>\n<div id="nt-layout-preview-root">\n<div id="nt-layout-preview-mount">\n${rmlSource}\n</div>\n</div>\n</body>\n</rml>`;
      }
      const documentSource = rmlSource.trim().length > 0 ? rmlSource : '<rml><head><title>Empty Layout Preview</title></head><body></body></rml>';
      return injectHeadContent(documentSource, style);
    }

    function escapeText(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function escapeRcssString(value) {
      return String(value == null ? '' : value).replace(/\\/g, '\\\\').replace(/"/g, '\\"');
    }

    function projectImageSource(asset) {
      return asset && typeof asset.path === 'string' && asset.path.length > 0 ? `project:/${asset.path}` : '';
    }

    function buildShaderPreviewRml(data) {
      const materialId = data && typeof data.previewMaterialId === 'string' ? data.previewMaterialId : 'ui/noise_panel';
      const escapedMaterialId = escapeRcssString(materialId);
      return `<rml>\n<head>\n<title>Shader Preview</title>\n<style>\nbody { margin: 0; width: 100%; height: 100%; background-color: #0f172a; font-family: Liberation Sans; }\n#nt-shader-preview-stage { position: absolute; left: 0; top: 0; right: 0; bottom: 0; background-color: #0f172a; }\n#nt-shader-preview-square { position: absolute; left: 50%; top: 50%; width: 256px; height: 256px; margin-left: -128px; margin-top: -128px; background-color: #1e293b; border: 1px #94a3b8; decorator: shader("${escapedMaterialId}"); }\n</style>\n</head>\n<body>\n<div id="nt-shader-preview-stage"><div id="nt-shader-preview-square"></div></div>\n</body>\n</rml>`;
    }

    function buildMaterialPreviewRml(data) {
      const materialId = data && typeof data.materialId === 'string' ? data.materialId : 'ui/noise_panel';
      const escapedMaterialId = escapeRcssString(materialId);
      return `<rml>\n<head>\n<title>Material Preview</title>\n<style>\nbody { margin: 0; width: 100%; height: 100%; background-color: #111827; font-family: Liberation Sans; }\n#nt-material-preview-stage { position: absolute; left: 0; top: 0; right: 0; bottom: 0; background-color: #111827; }\n#nt-material-preview-card { position: absolute; left: 50%; top: 50%; width: 256px; height: 256px; margin-left: -128px; margin-top: -128px; background-color: #1f2937; border: 1px #94a3b8; decorator: shader("${escapedMaterialId}"); }\n#nt-material-preview-label { position: absolute; left: 16px; top: 16px; color: #cbd5e1; font-size: 14px; }\n</style>\n</head>\n<body>\n<div id="nt-material-preview-stage"><div id="nt-material-preview-label">${escapeText(materialId)}</div><div id="nt-material-preview-card"></div></div>\n</body>\n</rml>`;
    }

    function buildCharacterPreviewRml(data) {
      const name = data && (data.displayName || data.label || data.characterId) ? data.displayName || data.label || data.characterId : 'Character';
      const pose = data && data.pose ? data.pose : null;
      const expression = data && data.expression ? data.expression : null;
      const spriteSource = projectImageSource(data && data.resolvedSprite);
      const material = data && data.resolvedMaterial && data.resolvedMaterial.id ? data.resolvedMaterial.id : '';
      const imageMarkup = spriteSource
        ? `<img id="nt-character-preview-sprite" src="${escapeText(spriteSource)}" />`
        : '<div id="nt-character-preview-placeholder">No sprite selected</div>';
      const materialStyle = material ? ` decorator: shader("${escapeRcssString(material)}");` : '';
      return `<rml>\n<head>\n<title>Character Preview</title>\n<style>\nbody { margin: 0; width: 100%; height: 100%; background-color: #0f172a; font-family: Liberation Sans; color: #e5e7eb; }\n#nt-character-preview-stage { position: absolute; left: 0; top: 0; right: 0; bottom: 0; background-color: #0f172a; }\n#nt-character-preview-card { position: absolute; left: 50%; top: 50%; width: 320px; height: 420px; margin-left: -160px; margin-top: -210px; background-color: #111827; border: 1px #334155;${materialStyle} }\n#nt-character-preview-sprite { position: absolute; left: 24px; top: 48px; width: 272px; height: 272px; }\n#nt-character-preview-placeholder { position: absolute; left: 24px; top: 48px; width: 272px; height: 272px; border: 1px #475569; color: #94a3b8; text-align: center; padding-top: 122px; }\n#nt-character-preview-name { position: absolute; left: 24px; top: 336px; right: 24px; color: #f8fafc; font-size: 22px; }\n#nt-character-preview-meta { position: absolute; left: 24px; top: 368px; right: 24px; color: #94a3b8; font-size: 13px; }\n</style>\n</head>\n<body>\n<div id="nt-character-preview-stage"><div id="nt-character-preview-card">${imageMarkup}<div id="nt-character-preview-name">${escapeText(name)}</div><div id="nt-character-preview-meta">Pose: ${escapeText(pose && pose.label || pose && pose.id || 'none')} | Expression: ${escapeText(expression && expression.label || expression && expression.id || 'none')}</div></div></div>\n</body>\n</rml>`;
    }


    function buildRoomPreviewRml(data) {
      const name = data && (data.displayName || data.label || data.roomId) ? data.displayName || data.label || data.roomId : 'Room';
      const background = data && data.background ? data.background : {};
      const backgroundAsset = data && data.backgroundAsset ? data.backgroundAsset : null;
      const backgroundSource = projectImageSource(backgroundAsset);
      const backgroundColor = background && typeof background.color === 'string' && background.color.length > 0 ? background.color : '#111827';
      const material = data && data.backgroundMaterial && data.backgroundMaterial.id ? data.backgroundMaterial.id : '';
      const materialStyle = material ? ` decorator: shader("${escapeRcssString(material)}");` : '';
      const description = data && data.description && typeof data.description.source === 'string' ? data.description.source : '';
      const paths = data && Array.isArray(data.paths) ? data.paths : [];
      const hotspots = data && Array.isArray(data.hotspots) ? data.hotspots : [];
      const showHotspots = !data || !data.preview || data.preview.showHotspots !== false;
      const backgroundMarkup = backgroundSource
        ? `<img id="nt-room-preview-background-image" src="${escapeText(backgroundSource)}" />`
        : '<div id="nt-room-preview-background-placeholder">No background image selected</div>';
      const pathMarkup = paths.filter((path) => path && path.enabled !== false).map((path) => {
        const target = path.targetLabel || (path.target && path.target.$ref && path.target.$ref.id) || 'no target';
        return `<button class="nt-room-preview-path">${escapeText(path.label || path.direction || path.id)} → ${escapeText(target)}</button>`;
      }).join('');
      const hotspotMarkup = showHotspots ? hotspots.map((hotspot) => {
        if (!hotspot || !hotspot.bounds) return '';
        const b = hotspot.bounds;
        const left = Math.max(0, Math.min(100, Number(b.x || 0) * 100));
        const top = Math.max(0, Math.min(100, Number(b.y || 0) * 100));
        const width = Math.max(1, Math.min(100, Number(b.width || 0) * 100));
        const height = Math.max(1, Math.min(100, Number(b.height || 0) * 100));
        const objectLabel = hotspot.objectMetadata && hotspot.objectMetadata.label ? hotspot.objectMetadata.label : hotspot.label || hotspot.id;
        return `<button class="nt-room-preview-hotspot" style="left: ${left}%; top: ${top}%; width: ${width}%; height: ${height}%;" nt-object="${escapeText(hotspot.object && hotspot.object.$ref ? hotspot.object.$ref.id : hotspot.id)}"><span>${escapeText(objectLabel)}</span></button>`;
      }).join('') : '';
      return `<rml>\n<head>\n<title>Room Preview</title>\n<style>\nbody { margin: 0; width: 100%; height: 100%; background-color: ${escapeRcssString(backgroundColor)}; font-family: Liberation Sans; color: #e5e7eb; }\n#nt-room-preview-stage { position: absolute; left: 0; top: 0; right: 0; bottom: 0; overflow: hidden; background-color: ${escapeRcssString(backgroundColor)};${materialStyle} }\n#nt-room-preview-background-image { position: absolute; left: 0; top: 0; width: 100%; height: 100%; }\n#nt-room-preview-background-placeholder { position: absolute; left: 24px; top: 24px; right: 24px; bottom: 148px; border: 1px #475569; color: #94a3b8; text-align: center; padding-top: 120px; }\n#nt-room-preview-title { position: absolute; left: 24px; top: 18px; padding: 8px 12px; background-color: rgba(15, 23, 42, 180); color: #f8fafc; font-size: 22px; }\n#nt-room-preview-description { position: absolute; left: 24px; right: 24px; bottom: 64px; min-height: 48px; padding: 10px 12px; background-color: rgba(15, 23, 42, 210); color: #e5e7eb; font-size: 14px; }\n#nt-room-preview-paths { position: absolute; left: 24px; right: 24px; bottom: 16px; height: 36px; }\n.nt-room-preview-path { margin-right: 8px; min-width: 80px; }\n.nt-room-preview-hotspot { position: absolute; border: 1px #f59e0b; background-color: rgba(245, 158, 11, 45); color: #fffbeb; font-size: 12px; text-align: left; }\n.nt-room-preview-hotspot span { display: block; padding: 3px 5px; background-color: rgba(15, 23, 42, 180); }\n</style>\n</head>\n<body>\n<div id="nt-room-preview-stage">${backgroundMarkup}${hotspotMarkup}<div id="nt-room-preview-title">${escapeText(name)}</div><div id="nt-room-preview-description">${escapeText(description || 'No room description yet.')}</div><div id="nt-room-preview-paths">${pathMarkup}</div></div>\n</body>\n</rml>`;
    }

    function buildDialoguePreviewRml(data) {
      const name = data && (data.displayName || data.label || data.dialogueId) ? data.displayName || data.label || data.dialogueId : 'Dialogue';
      const block = data && data.selectedBlock ? data.selectedBlock : null;
      const blockLabel = block && (block.label || block.id) ? block.label || block.id : 'No block selected';
      const blockType = block && block.type ? block.type : 'missing';
      const segments = block && Array.isArray(block.segments) ? block.segments : [];
      const choices = data && Array.isArray(data.choices) ? data.choices : [];
      const background = data && data.preview && data.preview.background === 'light' ? '#f8fafc' : '#0f172a';
      const foreground = data && data.preview && data.preview.background === 'light' ? '#0f172a' : '#e5e7eb';
      const segmentMarkup = segments.length > 0 ? segments.map((segment) => {
        if (!segment) return '';
        const speaker = segment.speakerMetadata && segment.speakerMetadata.displayName ? segment.speakerMetadata.displayName : '';
        const text = segment.text && typeof segment.text.source === 'string' && segment.text.source.trim().length > 0 ? segment.text.source : '[empty line]';
        const flags = [];
        if (segment.condition && segment.condition.enabled) flags.push('condition');
        if (segment.script && segment.script.enabled) flags.push('script');
        if (segment.flags && segment.flags.showOnce) flags.push('once');
        const meta = flags.length > 0 ? `<span class="nt-dialogue-preview-flags">${escapeText(flags.join(' · '))}</span>` : '';
        return `<div class="nt-dialogue-preview-segment"><div class="nt-dialogue-preview-speaker">${escapeText(speaker)}</div><div class="nt-dialogue-preview-line">${escapeText(text)}</div>${meta}</div>`;
      }).join('') : '<div class="nt-dialogue-preview-empty">No dialogue segments in this block.</div>';
      const choiceMarkup = choices.length > 0 ? choices.map((choice) => {
        const target = choice.targetLabel || choice.toBlockId || 'missing target';
        const label = choice.label || choice.kind || choice.id;
        const flags = choice.condition && choice.condition.enabled ? ' condition' : '';
        return `<button class="nt-dialogue-preview-choice">${escapeText(label)} → ${escapeText(target)}${escapeText(flags)}</button>`;
      }).join('') : '<div class="nt-dialogue-preview-no-choices">No outgoing choices.</div>';
      return `<rml>\n<head>\n<title>Dialogue Preview</title>\n<style>\nbody { margin: 0; width: 100%; height: 100%; background-color: ${background}; font-family: Liberation Sans; color: ${foreground}; }\n#nt-dialogue-preview-stage { position: absolute; left: 0; top: 0; right: 0; bottom: 0; padding: 24px; background-color: ${background}; }\n#nt-dialogue-preview-card { position: absolute; left: 24px; right: 24px; top: 24px; bottom: 24px; background-color: rgba(15, 23, 42, 220); border: 1px #334155; padding: 18px; }\n#nt-dialogue-preview-title { color: #f8fafc; font-size: 22px; margin-bottom: 4px; }\n#nt-dialogue-preview-meta { color: #94a3b8; font-size: 12px; margin-bottom: 16px; }\n.nt-dialogue-preview-segment { margin-bottom: 10px; padding: 10px; background-color: rgba(30, 41, 59, 210); }\n.nt-dialogue-preview-speaker { color: #93c5fd; font-size: 12px; margin-bottom: 4px; }\n.nt-dialogue-preview-line { color: #e5e7eb; font-size: 15px; }\n.nt-dialogue-preview-flags { display: block; margin-top: 4px; color: #fbbf24; font-size: 11px; }\n#nt-dialogue-preview-choices { position: absolute; left: 18px; right: 18px; bottom: 18px; }\n.nt-dialogue-preview-choice { display: block; width: 100%; margin-top: 6px; text-align: left; }\n.nt-dialogue-preview-empty, .nt-dialogue-preview-no-choices { color: #94a3b8; font-size: 13px; }\n</style>\n</head>\n<body>\n<div id="nt-dialogue-preview-stage"><div id="nt-dialogue-preview-card"><div id="nt-dialogue-preview-title">${escapeText(name)}</div><div id="nt-dialogue-preview-meta">${escapeText(blockLabel)} · ${escapeText(blockType)}</div>${segmentMarkup}<div id="nt-dialogue-preview-choices">${choiceMarkup}</div></div></div>\n</body>\n</rml>`;
    }

    function buildScenePreviewRml(data) {
      const name = data && (data.displayName || data.label || data.sceneId) ? data.displayName || data.label || data.sceneId : 'Scene';
      const selected = data && data.selectedStep ? data.selectedStep : null;
      const selectedLabel = selected && (selected.label || selected.id) ? selected.label || selected.id : 'No step selected';
      const selectedType = selected && selected.type ? selected.type : 'missing';
      const state = data && data.state ? data.state : {};
      const background = data && data.preview && data.preview.background === 'light' ? '#f8fafc' : '#0f172a';
      const foreground = data && data.preview && data.preview.background === 'light' ? '#0f172a' : '#e5e7eb';
      const steps = data && Array.isArray(data.steps) ? data.steps : [];
      const stepMarkup = steps.slice(0, 12).map((step) => {
        const marker = step.selected ? '▶ ' : '';
        const flags = [];
        if (step.indicators && step.indicators.condition) flags.push('condition');
        if (step.indicators && step.indicators.script) flags.push('script');
        if (step.indicators && step.indicators.autosaveBefore) flags.push('autosave-before');
        if (step.indicators && step.indicators.autosaveAfter) flags.push('autosave-after');
        const meta = flags.length > 0 ? ` · ${flags.join(', ')}` : '';
        return `<div class="nt-scene-preview-step${step.selected ? ' selected' : ''}">${escapeText(marker + (step.label || step.id || 'step'))}<span>${escapeText((step.type || 'unknown') + meta)}</span></div>`;
      }).join('');
      const characters = state && Array.isArray(state.characters) ? state.characters : [];
      const characterMarkup = characters.length > 0 ? characters.map((character) => {
        const meta = [character.action, character.position, character.pose, character.expression].filter(Boolean).join(' · ');
        const name = character.characterMetadata && character.characterMetadata.displayName ? character.characterMetadata.displayName : character.character && character.character.$ref ? character.character.$ref.id : 'Character';
        return `<div class="nt-scene-preview-chip">${escapeText(name)}<span>${escapeText(meta)}</span></div>`;
      }).join('') : '<div class="nt-scene-preview-muted">No visible characters.</div>';
      const backgroundSummary = state && state.background ? state.background : null;
      const backgroundLabel = backgroundSummary && backgroundSummary.assetMetadata && backgroundSummary.assetMetadata.label ? backgroundSummary.assetMetadata.label : backgroundSummary && backgroundSummary.color ? backgroundSummary.color : 'Default background';
      const dialogue = state && state.dialogue && state.dialogue.dialogueMetadata ? state.dialogue.dialogueMetadata : null;
      const dialogueMarkup = dialogue ? `<div class="nt-scene-preview-chip">${escapeText(dialogue.displayName || dialogue.label || dialogue.id)}<span>${escapeText(dialogue.blockLabel || dialogue.blockId || 'entry')}</span></div>` : '<div class="nt-scene-preview-muted">No dialogue at selected state.</div>';
      return `<rml>\n<head>\n<title>Scene Preview</title>\n<style>\nbody { margin: 0; width: 100%; height: 100%; background-color: ${background}; font-family: Liberation Sans; color: ${foreground}; }\n#nt-scene-preview-stage { position: absolute; left: 0; top: 0; right: 0; bottom: 0; padding: 20px; background-color: ${background}; }\n#nt-scene-preview-card { position: absolute; left: 20px; right: 20px; top: 20px; bottom: 20px; background-color: rgba(15, 23, 42, 220); border: 1px #334155; padding: 16px; }\n#nt-scene-preview-title { color: #f8fafc; font-size: 22px; margin-bottom: 4px; }\n#nt-scene-preview-meta { color: #94a3b8; font-size: 12px; margin-bottom: 12px; }\n#nt-scene-preview-state { position: absolute; left: 16px; top: 76px; width: 47%; bottom: 16px; }\n#nt-scene-preview-steps { position: absolute; right: 16px; top: 76px; width: 47%; bottom: 16px; }\n.nt-scene-preview-section-title { color: #93c5fd; font-size: 13px; margin: 10px 0 6px; }\n.nt-scene-preview-chip, .nt-scene-preview-step { margin-bottom: 6px; padding: 7px 8px; background-color: rgba(30, 41, 59, 210); color: #e5e7eb; font-size: 13px; }\n.nt-scene-preview-step.selected { border: 1px #60a5fa; }\n.nt-scene-preview-chip span, .nt-scene-preview-step span { display: block; margin-top: 2px; color: #94a3b8; font-size: 11px; }\n.nt-scene-preview-muted { color: #94a3b8; font-size: 12px; margin-bottom: 6px; }\n</style>\n</head>\n<body>\n<div id="nt-scene-preview-stage"><div id="nt-scene-preview-card"><div id="nt-scene-preview-title">${escapeText(name)}</div><div id="nt-scene-preview-meta">${escapeText(selectedLabel)} · ${escapeText(selectedType)}</div><div id="nt-scene-preview-state"><div class="nt-scene-preview-section-title">Background</div><div class="nt-scene-preview-chip">${escapeText(backgroundLabel)}<span>${escapeText(backgroundSummary && backgroundSummary.fit ? backgroundSummary.fit : '')}</span></div><div class="nt-scene-preview-section-title">Characters</div>${characterMarkup}<div class="nt-scene-preview-section-title">Dialogue</div>${dialogueMarkup}</div><div id="nt-scene-preview-steps"><div class="nt-scene-preview-section-title">Steps</div>${stepMarkup || '<div class="nt-scene-preview-muted">No scene steps.</div>'}</div></div></div>\n</body>\n</rml>`;
    }

    function emitDocumentDiagnostics(document) {
      const data = document && document.data ? document.data : null;
      if (!data || !Array.isArray(data.diagnostics)) return;
      data.diagnostics.forEach((diagnostic) => {
        if (!diagnostic || typeof diagnostic.message !== 'string') return;
        send({ version: protocolVersion, type: 'preview-diagnostic', diagnostic: { severity: diagnostic.severity || 'warning', message: diagnostic.message, path: diagnostic.path } });
      });
    }

    function executePreviewLua(message, source) {
      if (!source || source.trim().length === 0) return true;
      if (typeof Module._noveltea_preview_execute_lua_script !== 'function') {
        failCommand(message, 'Preview widget build does not export noveltea_preview_execute_lua_script. Rebuild the editor preview.');
        return false;
      }
      const ok = Module.ccall('noveltea_preview_execute_lua_script', 'number', ['string'], [source]);
      if (!ok) {
        failCommand(message, 'Lua preview script failed. Check the engine console for the Lua traceback.');
        return false;
      }
      return true;
    }

    function applyPreviewRml(message, rml, luaSource) {
      if (typeof Module._noveltea_preview_load_rml_document !== 'function') {
        failCommand(message, 'Preview widget build does not export noveltea_preview_load_rml_document. Rebuild the editor preview.');
        return;
      }
      if (!executePreviewLua(message, luaSource || '')) return;
      const ok = Module.ccall('noveltea_preview_load_rml_document', 'number', ['string'], [rml]);
      if (ok) {
        hideFailure();
        send({ version: protocolVersion, type: 'command-result', requestId: message.requestId, ok: true });
      } else {
        failCommand(message, 'RmlUi failed to load the preview document. Check RML/RCSS diagnostics and engine logs.');
      }
    }

    function applyPreviewDocument(message) {
      const document = message.document;
      const kind = document && document.kind ? document.kind : 'unknown';
      const data = document && document.data ? document.data : {};
      emitDocumentDiagnostics(document);
      if (kind === 'layout-preview') applyPreviewRml(message, buildLayoutPreviewRml(data), sourceText(data && data.lua));
      else if (kind === 'shader-preview') applyPreviewRml(message, buildShaderPreviewRml(data));
      else if (kind === 'material-preview') applyPreviewRml(message, buildMaterialPreviewRml(data));
      else if (kind === 'character-preview') applyPreviewRml(message, buildCharacterPreviewRml(data));
      else if (kind === 'room-preview') applyPreviewRml(message, buildRoomPreviewRml(data));
      else if (kind === 'dialogue-preview') applyPreviewRml(message, buildDialoguePreviewRml(data));
      else if (kind === 'scene-preview') applyPreviewRml(message, buildScenePreviewRml(data));
      else failCommand(message, `Preview widget cannot render document '${kind}'.`);
    }

    function runCommand(message) {
      try {
        if (!runtimeReady || !engineReady) {
          commandQueue.push(message);
          return;
        }
        if (message.version !== protocolVersion || typeof message.requestId !== 'string') return;
        if (message.type === 'set-preview-mode') {
          previewMode = message.mode || 'runtime';
          send({ version: protocolVersion, type: 'command-result', requestId: message.requestId, ok: true });
        } else if (message.type === 'load-preview-document' || message.type === 'update-preview-document') {
          applyPreviewDocument(message);
        } else if (message.type === 'request-preview-state') {
          send({ version: protocolVersion, type: 'preview-state', state: { mode: previewMode, ready: engineReady && runtimeReady } });
          send({ version: protocolVersion, type: 'command-result', requestId: message.requestId, ok: true });
        } else if (message.type === 'request-preview-snapshot') {
          failCommand(message, 'Preview snapshots are not implemented by the editor widget yet.');
        } else {
          send({ version: protocolVersion, type: 'command-result', requestId: message.requestId, ok: false, error: 'Unsupported editor preview widget command' });
        }
      } catch (error) {
        send({ version: protocolVersion, type: 'command-result', requestId: message.requestId || '', ok: false, error: String(error && error.message ? error.message : error) });
      }
    }

    function drainCommands() {
      if (!runtimeReady || !engineReady) return;
      while (commandQueue.length > 0) runCommand(commandQueue.shift());
    }

    function sendReadySnapshot() {
      if (!engineReady || !port) return;
      send({
        version: protocolVersion,
        type: 'ready',
        capabilities: ['layout-preview-v1', 'shader-preview-v1', 'material-preview-v1', 'character-preview-v1', 'room-preview-v1', 'dialogue-preview-v1', 'scene-preview-v1'],
      });
      drainCommands();
    }

    globalThis.NovelTeaPreviewBridge = {
      send,
      setPort(nextPort) {
        if (port) port.close();
        port = nextPort;
        port.onmessage = (event) => runCommand(event.data);
        if (typeof port.start === 'function') port.start();
        sendReadySnapshot();
        drainCommands();
      },
      markEngineReady(position, running) {
        engineReady = true;
        sendReadySnapshot();
        drainCommands();
      }
    };

    window.addEventListener('message', (event) => {
      const data = event.data;
      if (!data || data.type !== 'noveltea-preview-connect') return;
      if (!sessionToken || data.sessionToken !== sessionToken || data.version !== protocolVersion) return;
      const nextPort = event.ports && event.ports[0];
      if (nextPort) globalThis.NovelTeaPreviewBridge.setPort(nextPort);
    });

    function sendHello() {
      if (window.parent && window.parent !== window && sessionToken && !port) {
        window.parent.postMessage({ type: 'noveltea-preview-hello', version: protocolVersion, sessionToken }, '*');
      }
    }

    sendHello();
    const helloInterval = window.setInterval(() => {
      if (port) window.clearInterval(helloInterval);
      else sendHello();
    }, 250);

    function resizeCanvas() {
      const canvas = document.getElementById('canvas');
      const maxDpr = parseFloat(params.get('maxDpr') || '1') || 1;
      const dpr = Math.min(window.devicePixelRatio || 1, maxDpr);
      const rect = canvas.getBoundingClientRect();
      const logicalWidth = Math.max(1, Math.round(rect.width));
      const logicalHeight = Math.max(1, Math.round(rect.height));
      const framebufferWidth = Math.max(1, Math.round(logicalWidth * dpr));
      const framebufferHeight = Math.max(1, Math.round(logicalHeight * dpr));
      const scaleX = framebufferWidth / logicalWidth;
      const scaleY = framebufferHeight / logicalHeight;
      if (!runtimeReady) {
        canvas.width = framebufferWidth;
        canvas.height = framebufferHeight;
      }
      pendingResize = { logicalWidth, logicalHeight, framebufferWidth, framebufferHeight, scaleX, scaleY };
      scheduleResizeApply();
    }

    function scheduleResizeApply() {
      if (resizeScheduled) return;
      resizeScheduled = true;
      requestAnimationFrame(() => {
        resizeScheduled = false;
        applyPendingResize();
      });
    }

    function applyPendingResize() {
      if (!pendingResize || !runtimeReady || typeof Module._noveltea_preview_resize !== 'function') return;
      const resize = pendingResize;
      const key = `${resize.logicalWidth}x${resize.logicalHeight}:${resize.framebufferWidth}x${resize.framebufferHeight}:${resize.scaleX}x${resize.scaleY}`;
      if (key === appliedResizeKey) return;
      Module._noveltea_preview_resize(resize.logicalWidth, resize.logicalHeight, resize.framebufferWidth, resize.framebufferHeight, resize.scaleX, resize.scaleY);
      appliedResizeKey = key;
    }

    resizeCanvas();
    new ResizeObserver(resizeCanvas).observe(document.getElementById('canvas'));
    window.addEventListener('resize', resizeCanvas);
    requestAnimationFrame(resizeCanvas);

    globalThis.NovelTeaPreviewRuntimeReady = function() {
      runtimeReady = true;
      resizeCanvas();
      scheduleResizeApply();
      drainCommands();
    };
  })();

  var Module = {
    canvas: document.getElementById('canvas'),
    arguments: ['--preview-widget', '--demo', 'none', '--no-imgui'],
    onRuntimeInitialized: function() {
      if (typeof globalThis.NovelTeaPreviewRuntimeReady === 'function') globalThis.NovelTeaPreviewRuntimeReady();
    },
    print: function(text) { console.log(text); },
    printErr: function(text) { console.error(text); }
  };
</script>
