packages:
  - editor

nodeLinker: isolated
injectWorkspacePackages: true
autoInstallPeers: false

catalog:
  "@electron/fuses": 2.1.3
  electron: 43.1.1
  electron-builder: 26.15.3
  sharp: 0.35.3
  typescript: 7.0.2
  vite: npm:@voidzero-dev/vite-plus-core@0.2.5
  vite-plus: 0.2.5
  vitest: 4.1.10

overrides:
  "@electron/rebuild": 4.2.0
  tmp: 0.2.7
  vite: "catalog:"
  vitest: 4.1.10

peerDependencyRules:
  allowAny:
    - vite
  allowedVersions:
    "@electron/fuses": 2.1.3
    vite: "*"

allowBuilds:
  electron: true
  electron-winstaller: true
  esbuild: true
  sharp: true
