#approval_policy = "never"
sandbox_mode = "danger-full-access"

[agents]
# Direct children only: recursive delegation adds cost and coordination overhead.
# Five threads is a ceiling, not a target; most tasks should use zero to two subagents.
max_threads = 5
max_depth = 1
job_max_runtime_seconds = 1800

[sandbox_workspace_write]
network_access = true

[shell_environment_policy]
exclude = ["DEBUG"]
